<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>電梯帝國</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ── RESET & ROOT ── */
:root {
  --bg:      #0b0e18;
  --bg2:     #121623;
  --bg3:     #1b2030;
  --bg4:     #242a3a;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.15);
  --text:    #e6eaf4;
  --text2:   #7a85a3;
  --text3:   #434d68;
  --accent:  #38bdf8;
  --gold:    #fbbf24;
  --green:   #34d399;
  --red:     #f87171;
  --mono: 'Share Tech Mono', monospace;
  --sans: 'Noto Sans TC', sans-serif;
  /* iPhone 16 = 390 × 844 logical px */
  --phone-w: 390px;
  --phone-h: 844px;
  --floor-h: 64px;
  --elev-w:  52px;
  --elev-h:  58px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  background: #060810;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
}
body {
  width: var(--phone-w);
  height: var(--phone-h);
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  border-radius: 16px;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 24px 80px rgba(0,0,0,0.8);
}

/* ── TOPBAR ── */
#topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px 8px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#game-title { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 2px; }
.hstats { display: flex; gap: 8px; }
.hstat {
  display: flex; flex-direction: column; align-items: center;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 6px; padding: 3px 10px; min-width: 56px;
}
.hstat-lbl { font-size: 8px; color: var(--text3); font-family: var(--mono); letter-spacing: 1px; }
.hstat-val { font-family: var(--mono); font-size: 14px; font-weight: 700; }
#s-score { color: var(--accent); }
#s-del   { color: var(--green); }
#s-time  { color: var(--text2); font-size: 12px; }

/* ── CURRENT FLOOR INDICATOR ── */
#floor-indicator {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 14px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#fi-label  { font-size: 10px; color: var(--text3); font-family: var(--mono); }
#fi-floor  { font-family: var(--mono); font-size: 18px; color: var(--accent); font-weight: 700; }
#fi-pax    { font-family: var(--mono); font-size: 11px; color: var(--text2); }
#fi-dir    { font-size: 16px; }
#fi-state  { font-size: 10px; color: var(--text3); font-family: var(--mono); }

/* ── VIEWPORT: floors scroll, elevator fixed ── */
#game-area {
  flex: 1;
  position: relative;
  overflow: hidden;
}

/* The strip that actually scrolls */
#floors-strip {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  /* height set by JS */
  will-change: transform;
}

/* One floor row */
.floor-row {
  width: 100%;
  height: var(--floor-h);
  display: flex;
  align-items: center;
  border-bottom: 1px solid var(--border);
  position: relative;
  user-select: none;
}
.floor-row.is-current {
  background: rgba(56,189,248,0.06);
  border-bottom-color: rgba(56,189,248,0.2);
}
.floor-num {
  font-family: var(--mono); font-size: 11px; color: var(--text3);
  width: 28px; text-align: right; padding-right: 5px; flex-shrink: 0;
}
.floor-arrows {
  width: 16px; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; gap: 1px;
}
.arr-up   { font-size: 9px;  color: var(--green); line-height: 1; }
.arr-down { font-size: 9px;  color: var(--red);   line-height: 1; }
.floor-pax {
  flex: 1;
  display: flex; align-items: center; gap: 4px;
  padding: 0 8px;
  overflow: hidden;
}
/* gap on right side for elevator shaft */
.floor-shaft-gap { width: 70px; flex-shrink: 0; }

/* ── PAX FIGURES ── */
.pax-fig {
  display: flex; flex-direction: column; align-items: center;
  flex-shrink: 0;
}
.pax-head { width: 9px; height: 9px; border-radius: 50%; }
.pax-body { width: 11px; height: 12px; border-radius: 3px 3px 0 0; }
.pax-dest { font-family: var(--mono); font-size: 7px; color: var(--text3); margin-top: 1px; }
.pax-normal .pax-head, .pax-normal .pax-body { background: var(--accent); }
.pax-vip    .pax-head, .pax-vip    .pax-body { background: var(--gold); }

/* ── ELEVATOR SHAFT (fixed, right side) ── */
#elev-shaft {
  position: absolute;
  right: 12px;
  top: 0; bottom: 0;
  width: 60px;
  pointer-events: none;
}
/* The track line */
#elev-shaft::before {
  content: '';
  position: absolute;
  left: 50%; top: 0; bottom: 0;
  width: 2px;
  background: var(--border2);
  transform: translateX(-50%);
}
/* The elevator car — always vertically centred in #game-area */
#elev-car {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: var(--elev-w);
  height: var(--elev-h);
  border-radius: 6px;
  border: 2px solid var(--accent);
  background: rgba(56,189,248,0.13);
  color: var(--accent);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px;
  pointer-events: all;
  cursor: pointer;
  box-shadow: 0 0 0 0 var(--accent);
  transition: box-shadow 0.3s;
}
#elev-car.door-open {
  box-shadow: 0 0 16px rgba(56,189,248,0.5);
  animation: doorpulse 0.6s;
}
@keyframes doorpulse { 0%{opacity:0.6} 50%{opacity:1} 100%{opacity:1} }
#elev-dir  { font-size: 14px; line-height: 1; }
#elev-id   { font-family: var(--mono); font-size: 10px; font-weight: 700; opacity: 0.9; }
#elev-cnt  { font-family: var(--mono); font-size: 9px; opacity: 0.75; }

/* ── BOTTOM CONTROLS ── */
#controls {
  flex-shrink: 0;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 10px 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
#ctrl-row {
  display: flex; gap: 10px;
}
.ctrl-btn {
  flex: 1;
  height: 58px;
  border-radius: 10px;
  border: 2px solid;
  font-family: var(--mono);
  font-size: 26px;
  cursor: pointer;
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.1s, transform 0.08s;
  -webkit-tap-highlight-color: transparent;
}
.ctrl-btn:active { transform: scale(0.94); }
#btn-up   { border-color: var(--green); color: var(--green); }
#btn-up.active   { background: rgba(52,211,153,0.18); }
#btn-down { border-color: var(--red);   color: var(--red); }
#btn-down.active { background: rgba(248,113,113,0.18); }
#btn-stop {
  width: 100%;
  height: 40px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  color: var(--text2);
  background: transparent;
  font-family: var(--mono);
  font-size: 12px;
  cursor: pointer;
  transition: background 0.1s;
  -webkit-tap-highlight-color: transparent;
}
#btn-stop:active { background: var(--bg3); }
.ctrl-hint { font-size: 9px; color: var(--text3); font-family: var(--mono); text-align: center; }

/* ── FLOAT SCORE ── */
.float-score {
  position: fixed; pointer-events: none;
  font-family: var(--mono); font-size: 15px; font-weight: 700;
  z-index: 999;
  animation: floatUp 1s ease-out forwards;
}
@keyframes floatUp {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-48px) scale(0.8); }
}

/* ── LOG strip (slide-in items) ── */
#log-strip {
  position: absolute;
  left: 0; bottom: 0;
  width: calc(100% - 80px);
  pointer-events: none;
  display: flex; flex-direction: column-reverse;
  gap: 2px;
  padding: 4px 8px;
  z-index: 20;
  max-height: 80px;
  overflow: hidden;
}
.log-pill {
  font-family: var(--mono); font-size: 10px;
  padding: 2px 8px; border-radius: 4px;
  width: fit-content;
  animation: fadeInUp 0.3s ease;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.log-good { background: rgba(52,211,153,0.15); color: var(--green); }
.log-gold { background: rgba(251,191,36,0.15); color: var(--gold); }
.log-info { background: rgba(56,189,248,0.12); color: var(--accent); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="game-title">ELEVATOR</div>
  <div class="hstats">
    <div class="hstat"><div class="hstat-lbl">SCORE</div><div class="hstat-val" id="s-score">0</div></div>
    <div class="hstat"><div class="hstat-lbl">SENT</div><div class="hstat-val" id="s-del">0</div></div>
    <div class="hstat"><div class="hstat-lbl">TIME</div><div class="hstat-val" id="s-time">00:00</div></div>
  </div>
</div>

<!-- CURRENT FLOOR STRIP -->
<div id="floor-indicator">
  <div>
    <div id="fi-label">CURRENT FLOOR</div>
    <div id="fi-floor">1F</div>
  </div>
  <div id="fi-dir">─</div>
  <div style="text-align:right">
    <div id="fi-pax">0 / 6 人</div>
    <div id="fi-state">待機</div>
  </div>
</div>

<!-- GAME AREA: scrolling floors + fixed elevator -->
<div id="game-area">
  <div id="floors-strip"></div>

  <!-- Shaft + fixed elevator car -->
  <div id="elev-shaft">
    <div id="elev-car">
      <div id="elev-dir">─</div>
      <div id="elev-id">A</div>
      <div id="elev-cnt">0/6</div>
    </div>
  </div>

  <!-- Floating log -->
  <div id="log-strip"></div>
</div>

<!-- BOTTOM CONTROLS -->
<div id="controls">
  <div id="ctrl-row">
    <button class="ctrl-btn" id="btn-up">▲</button>
    <button class="ctrl-btn" id="btn-down">▼</button>
  </div>
  <button id="btn-stop">■ 停止 / 開門</button>
  <div class="ctrl-hint">按住▲▼移動 · 放開自動停靠 · 點樓層直達</div>
</div>

<script>
// ═══════════════════════════════
//  CONSTANTS
// ═══════════════════════════════
const NUM_FLOORS  = 20;
const CAPACITY    = 6;
const FLOOR_H     = 64;       // must match CSS --floor-h
const SPEED       = FLOOR_H * 2.6;  // px/sec (floors per sec)
const DOOR_TIME   = 800;      // ms
const SPAWN_MS    = 1600;

// ═══════════════════════════════
//  STATE
// ═══════════════════════════════
let G = {};

function initState() {
  G = {
    // elevator logical state
    floor:      0,          // current floor index (0 = ground)
    pixelY:     0,          // pixel offset from floor-0 bottom (goes up as floor goes up)
    dir:        0,          // -1 | 0 | 1
    pressing:   false,
    state:      'idle',     // idle | moving | door
    doorTimer:  0,
    target:     -1,         // click-to-go floor, -1 = none
    pax:        [],

    // game
    score:      0,
    delivered:  0,
    elapsed:    0,
    lastTime:   null,
    passengers: [],
    spawnTimer: 0,
    uid:        0,
    logs:       [],
  };
}

// ═══════════════════════════════
//  BUILD FLOORS DOM
// ═══════════════════════════════
function buildFloors() {
  const strip = document.getElementById('floors-strip');
  strip.innerHTML = '';
  strip.style.height = (NUM_FLOORS * FLOOR_H) + 'px';

  // Floors rendered top-to-bottom = high floor at top, floor 0 at bottom
  for (let f = NUM_FLOORS - 1; f >= 0; f--) {
    const row = document.createElement('div');
    row.className = 'floor-row';
    row.id = `fr-${f}`;
    row.innerHTML = `
      <div class="floor-num">${f + 1}</div>
      <div class="floor-arrows" id="fa-${f}"></div>
      <div class="floor-pax" id="fp-${f}"></div>
      <div class="floor-shaft-gap"></div>`;
    row.addEventListener('click', () => clickFloor(f));
    strip.appendChild(row);
  }
}

// ═══════════════════════════════
//  SCROLLING: keep current floor centred in view
//  The strip origin is at the top of #game-area.
//  Floor f DOM top = (NUM_FLOORS - 1 - f) * FLOOR_H
//  We want that row to be centred in #game-area.
// ═══════════════════════════════
function stripOffsetForFloor(floorF, pixelY) {
  const gameH = document.getElementById('game-area').clientHeight;
  // Exact pixel position within the strip for this fractional floor position
  // pixelY = 0 means floor 0, pixelY = FLOOR_H means floor 1, etc.
  // DOM top of floor 0's row = (NUM_FLOORS-1) * FLOOR_H
  // So the "centre" of pixelY in strip coords:
  const stripPosOfCurrent = (NUM_FLOORS - 1) * FLOOR_H - pixelY + FLOOR_H / 2;
  // We want that to appear at gameH/2
  return gameH / 2 - stripPosOfCurrent;
}

function applyScroll() {
  const offset = stripOffsetForFloor(G.floor, G.pixelY);
  document.getElementById('floors-strip').style.transform = `translateY(${offset}px)`;
}

// ═══════════════════════════════
//  CONTROLS
// ═══════════════════════════════
function pressUp(on) {
  if (G.state === 'door') return;
  document.getElementById('btn-up').classList.toggle('active', on);
  if (on) {
    G.dir      = 1;
    G.pressing = true;
    G.target   = -1;
    G.state    = 'moving';
  } else {
    G.pressing = false;
    if (G.dir === 1 && G.state === 'moving') snapStop();
  }
}

function pressDown(on) {
  if (G.state === 'door') return;
  document.getElementById('btn-down').classList.toggle('active', on);
  if (on) {
    G.dir      = -1;
    G.pressing = true;
    G.target   = -1;
    G.state    = 'moving';
  } else {
    G.pressing = false;
    if (G.dir === -1 && G.state === 'moving') snapStop();
  }
}

function snapStop() {
  G.floor   = Math.round(G.pixelY / FLOOR_H);
  G.pixelY  = G.floor * FLOOR_H;
  G.dir     = 0;
  G.pressing = false;
  openDoors();
}

function clickFloor(f) {
  if (G.state === 'door') return;
  if (f === G.floor) { openDoors(); return; }
  G.target   = f;
  G.pressing = false;
  G.dir      = f > G.floor ? 1 : -1;
  G.state    = 'moving';
}

// ═══════════════════════════════
//  ELEVATOR PHYSICS
// ═══════════════════════════════
function updateElev(dt) {
  if (G.state === 'door') {
    G.doorTimer -= dt;
    if (G.doorTimer <= 0) closeDoors();
    return;
  }
  if (G.state !== 'moving') return;

  const px = SPEED * (dt / 1000);
  G.pixelY += G.dir * px;

  // Clamp to building bounds
  const maxPx = (NUM_FLOORS - 1) * FLOOR_H;
  G.pixelY = Math.max(0, Math.min(maxPx, G.pixelY));
  G.floor  = Math.round(G.pixelY / FLOOR_H);

  // Hit wall while pressing → stop
  if (G.pressing) {
    if ((G.dir === 1 && G.pixelY >= maxPx) || (G.dir === -1 && G.pixelY <= 0)) {
      snapStop(); return;
    }
    // Drop-off auto-stop: snap to floor if someone wants off here
    const f = Math.round(G.pixelY / FLOOR_H);
    if (Math.abs(G.pixelY - f * FLOOR_H) < 3 && G.pax.some(p => p.dest === f)) {
      G.pixelY = f * FLOOR_H;
      G.floor  = f;
      snapStop(); return;
    }
    return;
  }

  // Click-to-go: reached target
  if (G.target >= 0) {
    const tPx = G.target * FLOOR_H;
    if ((G.dir === 1 && G.pixelY >= tPx) || (G.dir === -1 && G.pixelY <= tPx)) {
      G.pixelY = tPx;
      G.floor  = G.target;
      G.target = -1;
      G.dir    = 0;
      G.state  = 'idle';
      openDoors();
    }
  }
}

function openDoors() {
  G.state     = 'door';
  G.doorTimer = DOOR_TIME;
  document.getElementById('elev-car').classList.add('door-open');
  handleExchange();
}

function closeDoors() {
  document.getElementById('elev-car').classList.remove('door-open');
  G.state = G.pressing ? 'moving' : 'idle';
  if (!G.pressing) G.dir = 0;
}

function handleExchange() {
  // Drop off
  G.pax = G.pax.filter(p => {
    if (p.dest !== G.floor) return true;
    const pts = p.type === 'vip' ? 3 : 1;
    G.score += pts;
    G.delivered++;
    addLog(`${p.type==='vip'?'⭐':''}到達 ${G.floor+1}F +${pts}`, p.type==='vip'?'gold':'good');
    floatScore(`+${pts}`, p.type==='vip'?'#fbbf24':'#38bdf8');
    return false;
  });

  // Board
  G.passengers.forEach(p => {
    if (!p.waiting || p.start !== G.floor) return;
    if (G.pax.length >= CAPACITY) return;
    if (G.dir !== 0 && p.dir !== G.dir) return;
    p.waiting = false;
    G.pax.push(p);
    addLog(`上梯 ${p.start+1}F→${p.dest+1}F`, 'info');
  });
}

// ═══════════════════════════════
//  SPAWN
// ═══════════════════════════════
function spawnPax(now) {
  if (now - G.spawnTimer < SPAWN_MS) return;
  G.spawnTimer = now;
  const start = Math.floor(Math.random() * NUM_FLOORS);
  let dest;
  do { dest = Math.floor(Math.random() * NUM_FLOORS); } while (dest === start);
  G.passengers.push({
    id: G.uid++, start, dest,
    dir: dest > start ? 1 : -1,
    type: Math.random() < 0.12 ? 'vip' : 'normal',
    waiting: true,
  });
}

// ═══════════════════════════════
//  RENDER
// ═══════════════════════════════
function renderAll(now) {
  // Scroll floors
  applyScroll();

  // Highlight current floor row
  document.querySelectorAll('.floor-row').forEach(r => r.classList.remove('is-current'));
  const curRow = document.getElementById(`fr-${G.floor}`);
  if (curRow) curRow.classList.add('is-current');

  // Elevator car visuals
  const dirEl = document.getElementById('elev-dir');
  dirEl.textContent = G.dir === 1 ? '▲' : G.dir === -1 ? '▼' : '─';
  dirEl.style.color  = G.dir === 1 ? 'var(--green)' : G.dir === -1 ? 'var(--red)' : 'var(--accent)';
  document.getElementById('elev-cnt').textContent = `${G.pax.length}/${CAPACITY}`;

  // Floor indicator
  document.getElementById('fi-floor').textContent = `${G.floor + 1}F`;
  document.getElementById('fi-pax').textContent   = `${G.pax.length} / ${CAPACITY} 人`;
  const stateMap = { idle:'待機', moving: G.dir===1?'上行':'下行', door:'開門' };
  document.getElementById('fi-state').textContent = stateMap[G.state] || '';
  document.getElementById('fi-dir').textContent   = G.dir === 1 ? '▲' : G.dir === -1 ? '▼' : '─';
  document.getElementById('fi-dir').style.color    = G.dir === 1 ? 'var(--green)' : G.dir === -1 ? 'var(--red)' : 'var(--text3)';

  // Passengers on floors
  for (let f = 0; f < NUM_FLOORS; f++) {
    const pArea  = document.getElementById(`fp-${f}`);
    const aArea  = document.getElementById(`fa-${f}`);
    if (!pArea) continue;
    const here = G.passengers.filter(p => p.waiting && p.start === f);
    pArea.innerHTML = here.slice(0, 8).map(p => `
      <div class="pax-fig pax-${p.type}">
        <div class="pax-head"></div>
        <div class="pax-body"></div>
        <div class="pax-dest">${p.dest+1}F</div>
      </div>`).join('');
    if (aArea) {
      const up = here.some(p => p.dir === 1);
      const dn = here.some(p => p.dir === -1);
      aArea.innerHTML =
        (up ? '<div class="arr-up">▲</div>'   : '') +
        (dn ? '<div class="arr-down">▼</div>' : '');
    }
  }

  // HUD
  document.getElementById('s-score').textContent = G.score;
  document.getElementById('s-del').textContent   = G.delivered;
  const s = Math.floor(G.elapsed / 1000);
  document.getElementById('s-time').textContent  =
    `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

// ═══════════════════════════════
//  LOG + FLOAT
// ═══════════════════════════════
function addLog(msg, type = '') {
  G.logs.unshift({ msg, type });
  if (G.logs.length > 5) G.logs.pop();
  const strip = document.getElementById('log-strip');
  strip.innerHTML = G.logs.map(l =>
    `<div class="log-pill log-${l.type}">${l.msg}</div>`
  ).join('');
}

function floatScore(text, color) {
  const car = document.getElementById('elev-car');
  const r   = car.getBoundingClientRect();
  const el  = document.createElement('div');
  el.className  = 'float-score';
  el.style.cssText = `left:${r.left + r.width/2 - 12}px; top:${r.top - 10}px; color:${color}`;
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1050);
}

// ═══════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════
function loop(now) {
  if (!G.lastTime) G.lastTime = now;
  const dt = Math.min(now - G.lastTime, 80);
  G.lastTime = now;
  G.elapsed += dt;

  spawnPax(now);
  updateElev(dt);
  renderAll(now);

  requestAnimationFrame(loop);
}

// ═══════════════════════════════
//  EVENTS
// ═══════════════════════════════
const btnUp = document.getElementById('btn-up');
btnUp.addEventListener('mousedown',  () => pressUp(true));
btnUp.addEventListener('mouseup',    () => pressUp(false));
btnUp.addEventListener('mouseleave', () => pressUp(false));
btnUp.addEventListener('touchstart', e => { e.preventDefault(); pressUp(true);  }, { passive:false });
btnUp.addEventListener('touchend',   e => { e.preventDefault(); pressUp(false); }, { passive:false });
btnUp.addEventListener('touchcancel',e => { pressUp(false); });

const btnDn = document.getElementById('btn-down');
btnDn.addEventListener('mousedown',  () => pressDown(true));
btnDn.addEventListener('mouseup',    () => pressDown(false));
btnDn.addEventListener('mouseleave', () => pressDown(false));
btnDn.addEventListener('touchstart', e => { e.preventDefault(); pressDown(true);  }, { passive:false });
btnDn.addEventListener('touchend',   e => { e.preventDefault(); pressDown(false); }, { passive:false });
btnDn.addEventListener('touchcancel',e => { pressDown(false); });

document.getElementById('btn-stop').addEventListener('click', () => {
  pressUp(false); pressDown(false);
  if (G.state === 'moving') snapStop();
  else if (G.state === 'idle') openDoors();
});

const keysHeld = new Set();
document.addEventListener('keydown', ev => {
  if (keysHeld.has(ev.key)) return;
  keysHeld.add(ev.key);
  if (ev.key === 'ArrowUp')   { ev.preventDefault(); pressUp(true); }
  if (ev.key === 'ArrowDown') { ev.preventDefault(); pressDown(true); }
  if (ev.key === ' ')         { ev.preventDefault(); document.getElementById('btn-stop').click(); }
});
document.addEventListener('keyup', ev => {
  keysHeld.delete(ev.key);
  if (ev.key === 'ArrowUp')   pressUp(false);
  if (ev.key === 'ArrowDown') pressDown(false);
});

// ═══════════════════════════════
//  START
// ═══════════════════════════════
initState();
buildFloors();
applyScroll();
addLog('按住 ▲▼ 移動電梯', 'info');
addLog('放開即停靠並開門', 'info');
requestAnimationFrame(loop);
</script>
</body>
</html>
