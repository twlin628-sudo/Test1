<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>電梯帝國</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #000000;
  --card-bg:    #1c1c1e;
  --card-hover: #2c2c2e;
  --border:     rgba(255,255,255,0.1);
  --text:       #ffffff;
  --text-dim:   #8e8e93;
  --accent:     #0a84ff;
  --gold:       #ffd60a;
  --green:      #32d74b;
  --red:        #ff453a;
  --mono:       'Share Tech Mono', monospace;
  --sans:       -apple-system, "SF Pro Text", "Noto Sans TC", sans-serif;

  /* iPhone 16 安全區 */
  --safe-top:    env(safe-area-inset-top, 59px);
  --safe-bottom: env(safe-area-inset-bottom, 34px);
  --safe-left:   env(safe-area-inset-left, 0px);
  --safe-right:  env(safe-area-inset-right, 0px);

  /* 版面常數 — 手機優先 */
  --topbar-h:    52px;
  --ctrl-h:      180px;   /* 底部控制列高度 */
}

*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  user-select: none;
}
html { height: 100%; }
body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  overflow: hidden;
  /* 撐滿含安全區的全螢幕 */
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
  padding-left: var(--safe-left);
  padding-right: var(--safe-right);
  display: flex;
  flex-direction: column;
}

/* ══════════════════════════════
   TOPBAR  (固定高度)
══════════════════════════════ */
#topbar {
  height: var(--topbar-h);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  z-index: 50;
}
#game-title {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 2px;
}
.top-stats-group { display: flex; gap: 18px; }
.top-stat { display: flex; flex-direction: column; align-items: flex-end; }
.top-stat-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.top-stat-val   { font-size: 15px; font-weight: 700; font-family: var(--mono); line-height: 1.2; }

/* ══════════════════════════════
   BUILDING AREA  (flex 撐滿剩餘高度)
══════════════════════════════ */
#building-wrap {
  flex: 1;
  min-height: 0;     /* 讓 flex child 可縮小 */
  position: relative;
  overflow: hidden;
}
#building-scroll {
  width: 100%;
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  padding: 8px 0 8px 0;
}
#building-scroll::-webkit-scrollbar { display: none; }

#building {
  position: relative;
  margin: 0 auto;
  /* width 由 JS 動態設定 */
}
#elev-layer {
  position: absolute;
  top: 8px;   /* 對齊 padding */
  left: 0;
  pointer-events: none;
  z-index: 5;
  /* width/height 由 JS 設定 */
}

/* ── floor rows ── */
.floor-row {
  display: flex;
  align-items: center;
  border-bottom: 1px solid var(--border);
  /* height 由 JS 常數 FLOOR_H 決定，此處給預設避免閃爍 */
  height: 48px;
  cursor: pointer;
  transition: background 0.15s;
}
.floor-row:active { background: var(--card-hover); }

.floor-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  width: 36px;
  text-align: center;
  font-weight: 700;
  flex-shrink: 0;
}
.floor-waiting {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 0 8px;
  overflow: hidden;
}

/* ── pax figures ── */
.pax-fig {
  display: flex; flex-direction: column; align-items: center;
  animation: paxIn 0.25s ease;
  flex-shrink: 0;
}
@keyframes paxIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.pax-head { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
.pax-body { width: 10px; height: 11px; border-radius: 3px 3px 0 0; background: var(--accent); margin-top: 1px; }
.pax-dest { font-family: var(--mono); font-size: 8px; margin-top: 2px; font-weight: 700; color: var(--text-dim); }
.pax-vip .pax-head,
.pax-vip .pax-body { background: var(--gold); }
.pax-vip .pax-dest { color: var(--gold); }

/* ── elevator cars ── */
.elev-car {
  position: absolute;
  border-radius: 8px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: all; cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.6);
  transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
}
.elev-car.selected {
  border-width: 2px !important;
  border-color: #fff !important;
  transform: scale(1.06);
  box-shadow: 0 0 16px rgba(255,255,255,0.25);
}
.elev-dir { font-size: 13px; font-weight: 700; line-height: 1; }
.elev-cnt { font-family: var(--mono); font-size: 9px; font-weight: 700; margin-top: 2px; }

/* ══════════════════════════════
   BOTTOM CONTROLS
══════════════════════════════ */
#ctrl-bar {
  height: var(--ctrl-h);
  flex-shrink: 0;
  background: var(--card-bg);
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 12px 20px 8px;
  gap: 10px;
}

/* 電梯選擇頁籤 */
#elev-tabs {
  display: flex;
  gap: 8px;
}
.elev-tab {
  flex: 1; height: 32px; border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text-dim);
  font-family: var(--mono); font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  cursor: pointer; transition: all 0.15s;
}
.elev-tab.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* 方向按鈕 */
#dir-row {
  display: flex;
  gap: 12px;
  flex: 1;
}
.dir-btn {
  flex: 1;
  border-radius: 16px;
  border: none;
  font-size: 28px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.08s;
  /* 增大觸控面積 */
  min-height: 60px;
}
.dir-btn:active { transform: scale(0.90); }
#btn-up   { background: rgba(50, 215, 75, 0.18); color: var(--green); }
#btn-down { background: rgba(255, 69, 58, 0.18); color: var(--red);  }
#btn-stop {
  flex: 0.8;
  background: var(--card-hover);
  color: var(--text);
  border: 1px solid var(--border);
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  border-radius: 16px;
  min-height: 60px;
}

/* ══════════════════════════════
   LOG OVERLAY (tap-to-open)
══════════════════════════════ */
#log-toggle {
  position: absolute;
  top: calc(var(--topbar-h) + 8px);
  right: 12px;
  z-index: 40;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(28,28,30,0.85);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
#log-panel {
  position: absolute;
  top: calc(var(--topbar-h) + 50px);
  right: 12px;
  width: 200px;
  max-height: 220px;
  background: rgba(28,28,30,0.92);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 12px;
  overflow-y: auto;
  z-index: 39;
  display: none;
  scrollbar-width: none;
}
#log-panel.open { display: block; }
#log-panel::-webkit-scrollbar { display: none; }
.log-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.log-item  { font-family: var(--mono); font-size: 10px; color: var(--text-dim); padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

/* ══════════════════════════════
   GAME OVER
══════════════════════════════ */
#gameover-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  backdrop-filter: blur(16px);
  z-index: 200;
  display: none; align-items: center; justify-content: center;
  padding: 20px;
}
#gameover-overlay.show { display: flex; }
#gameover-box {
  background: var(--card-bg);
  border-radius: 28px;
  padding: 40px 32px;
  text-align: center;
  width: 100%; max-width: 340px;
  border: 1px solid var(--border);
}
#go-title  { font-family: var(--mono); font-size: 36px; margin-bottom: 6px; color: var(--gold); }
#go-sub    { color: var(--text-dim); font-size: 13px; margin-bottom: 24px; }
#go-stats  { font-family: var(--mono); font-size: 13px; line-height: 2.2; margin-bottom: 8px; }
#restart-btn {
  width: 100%; padding: 16px;
  background: var(--accent); color: white;
  border: none; border-radius: 16px;
  font-size: 16px; font-weight: 700;
  margin-top: 16px; cursor: pointer;
  transition: opacity 0.15s;
}
#restart-btn:active { opacity: 0.75; }

/* ══════════════════════════════
   DESKTOP 覆蓋（寬螢幕維持橫排）
══════════════════════════════ */
@media (min-width: 600px) {
  :root { --ctrl-h: 0px; }
  body { flex-direction: column; }
  #building-wrap { flex: 1; }
  #ctrl-bar { display: none; }
  /* 桌機版把控制列嵌在右欄（可依需求擴充） */
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div id="game-title">ELEVATOR EMPIRE</div>
  <div class="top-stats-group">
    <div class="top-stat">
      <span class="top-stat-label">Score</span>
      <span class="top-stat-val" id="score-val" style="color:var(--gold)">0</span>
    </div>
    <div class="top-stat">
      <span class="top-stat-label">送達</span>
      <span class="top-stat-val" id="delivered-val" style="color:var(--green)">0</span>
    </div>
    <div class="top-stat">
      <span class="top-stat-label">Time</span>
      <span class="top-stat-val" id="time-val">00:00</span>
    </div>
  </div>
</div>

<!-- LOG TOGGLE -->
<div id="log-toggle" onclick="toggleLog()">📋</div>
<div id="log-panel">
  <div class="log-label">Activity Log</div>
  <div id="log-area"></div>
</div>

<!-- BUILDING -->
<div id="building-wrap">
  <div id="building-scroll">
    <div id="building"></div>
    <div id="elev-layer"></div>
  </div>
</div>

<!-- BOTTOM CONTROLS -->
<div id="ctrl-bar">
  <!-- 電梯選擇 -->
  <div id="elev-tabs">
    <button class="elev-tab active" id="tab-0" onclick="selectElev(0)">
      <span style="color:#0a84ff">■</span> 電梯 A
    </button>
    <button class="elev-tab" id="tab-1" onclick="selectElev(1)">
      <span style="color:#5e5ce6">■</span> 電梯 B
    </button>
  </div>
  <!-- 方向 + 停止 -->
  <div id="dir-row">
    <button class="dir-btn" id="btn-up">▲</button>
    <button class="dir-btn" id="btn-stop">STOP<br>OPEN</button>
    <button class="dir-btn" id="btn-down">▼</button>
  </div>
</div>

<!-- GAME OVER -->
<div id="gameover-overlay">
  <div id="gameover-box">
    <div id="go-title">FINISH</div>
    <div id="go-sub">Operation Completed</div>
    <div id="go-stats"></div>
    <button id="restart-btn" onclick="location.reload()">PLAY AGAIN</button>
  </div>
</div>

<script>
/* ══════════════════════════════
   CONSTANTS
══════════════════════════════ */
const NUM_FLOORS = 10;
const NUM_ELEVS  = 2;
const CAPACITY   = 6;
const FLOOR_H    = 52;      // px per floor
const ELEV_W     = 40;
const ELEV_H     = 44;
const FLOOR_NUM_W = 36;     // 層號欄寬
const PAX_AREA_W  = 0;      // 動態計算
const SHAFT_W     = 50;
const SPEED       = FLOOR_H * 2.5;
const DOOR_TIME   = 800;
const SPAWN_MS    = 2000;
const GAME_DURATION = 3 * 60 * 1000; // 3 分鐘

const COLORS = ['#0a84ff', '#5e5ce6'];

let G = {};

/* ══════════════════════════════
   LAYOUT CALCULATION
══════════════════════════════ */
function getBuildingWidth() {
  const wrapW = document.getElementById('building-wrap').clientWidth;
  // 讓建築物撐滿容器，但留點邊距
  return Math.min(wrapW, 393); // 最大 393pt (iPhone 16 邏輯寬)
}

function getShaftStartX(buildingW) {
  // 層號 + 等待區（動態）+ 電梯井
  const shaftsTotal = NUM_ELEVS * SHAFT_W;
  const paxW = buildingW - FLOOR_NUM_W - shaftsTotal - 8;
  return FLOOR_NUM_W + Math.max(paxW, 60);
}

/* ══════════════════════════════
   INIT
══════════════════════════════ */
function initState() {
  G = {
    score: 0, delivered: 0, elapsed: 0, lastTime: null, gameOver: false,
    passengers: [], elevators: [], selectedElev: 0,
    spawnTimer: 0, uid: 0, logs: [],
  };
}

function buildFloors() {
  const bld = document.getElementById('building');
  bld.innerHTML = '';
  const W = getBuildingWidth();
  bld.style.width = W + 'px';

  for (let f = NUM_FLOORS - 1; f >= 0; f--) {
    const row = document.createElement('div');
    row.className = 'floor-row';
    row.style.height = FLOOR_H + 'px';
    row.style.width  = W + 'px';
    row.innerHTML = `
      <div class="floor-num">${f + 1}</div>
      <div class="floor-waiting" id="fwait-${f}"></div>
    `;
    row.addEventListener('click', () => clickFloor(f));
    bld.appendChild(row);
  }
}

function buildElevators() {
  const layer  = document.getElementById('elev-layer');
  layer.innerHTML = '';
  G.elevators = [];

  const W = getBuildingWidth();
  const shaftX = getShaftStartX(W);
  // 設定 layer 寬度讓絕對定位正確
  layer.style.width  = W + 'px';
  layer.style.height = (NUM_FLOORS * FLOOR_H) + 'px';

  [0, NUM_FLOORS - 1].forEach((sf, i) => {
    const e = {
      id: i, color: COLORS[i], floor: sf,
      pixelY: sf * FLOOR_H,
      target: -1, dir: 0, pressing: false, state: 'idle', doorTimer: 0, pax: [],
    };
    const x = shaftX + i * SHAFT_W + (SHAFT_W - ELEV_W) / 2;
    const car = document.createElement('div');
    car.className = 'elev-car' + (i === 0 ? ' selected' : '');
    car.id = `ecar-${i}`;
    car.style.cssText = `
      background: var(--card-bg);
      border: 1.5px solid ${e.color};
      color: ${e.color};
      width: ${ELEV_W}px;
      height: ${ELEV_H}px;
      left: ${x}px;
    `;
    car.innerHTML = `<div class="elev-dir" id="edir-${i}">—</div><div class="elev-cnt" id="ecnt-${i}">0</div>`;
    car.addEventListener('click', ev => { ev.stopPropagation(); selectElev(i); });
    layer.appendChild(car);

    e.el  = car;
    e.shaftX = x;
    posElev(e);
    G.elevators.push(e);
  });
}

/* ══════════════════════════════
   ELEVATOR SELECTION
══════════════════════════════ */
function selectElev(i) {
  G.selectedElev = i;
  document.querySelectorAll('.elev-car').forEach((el, idx) =>
    el.classList.toggle('selected', idx === i));
  document.querySelectorAll('.elev-tab').forEach((el, idx) =>
    el.classList.toggle('active', idx === i));
}

/* ══════════════════════════════
   CONTROLS
══════════════════════════════ */
function pressUp(on) {
  const e = G.elevators[G.selectedElev];
  if (!e || e.state === 'door') return;
  e.pressing = on;
  if (on) { e.dir = 1; e.target = -1; e.state = 'moving'; }
  else if (e.dir === 1) snapStop(e);
}
function pressDown(on) {
  const e = G.elevators[G.selectedElev];
  if (!e || e.state === 'door') return;
  e.pressing = on;
  if (on) { e.dir = -1; e.target = -1; e.state = 'moving'; }
  else if (e.dir === -1) snapStop(e);
}
function snapStop(e) {
  e.floor  = Math.round(e.pixelY / FLOOR_H);
  e.pixelY = e.floor * FLOOR_H;
  e.dir = 0; e.pressing = false;
  openDoors(e);
}
function clickFloor(f) {
  const e = G.elevators[G.selectedElev];
  if (!e || e.state === 'door') return;
  if (f === e.floor) { openDoors(e); return; }
  e.target = f; e.dir = f > e.floor ? 1 : -1; e.state = 'moving';
}

/* ══════════════════════════════
   PHYSICS
══════════════════════════════ */
function updateElev(e, dt) {
  if (e.state === 'door') {
    e.doorTimer -= dt;
    if (e.doorTimer <= 0) closeDoors(e);
    return;
  }
  if (e.state !== 'moving') return;

  const px   = SPEED * (dt / 1000);
  const maxPx = (NUM_FLOORS - 1) * FLOOR_H;
  e.pixelY = Math.max(0, Math.min(maxPx, e.pixelY + e.dir * px));
  e.floor  = Math.round(e.pixelY / FLOOR_H);

  if (e.pressing) {
    if ((e.dir === 1 && e.pixelY >= maxPx) || (e.dir === -1 && e.pixelY <= 0)) {
      snapStop(e); return;
    }
    const f = Math.round(e.pixelY / FLOOR_H);
    if (Math.abs(e.pixelY - f * FLOOR_H) < 4 && e.pax.some(p => p.dest === f)) {
      e.pixelY = f * FLOOR_H; e.floor = f; openDoors(e);
    }
    return;
  }

  if (e.target >= 0) {
    const tPx = e.target * FLOOR_H;
    if ((e.dir === 1 && e.pixelY >= tPx) || (e.dir === -1 && e.pixelY <= tPx)) {
      e.pixelY = tPx; e.floor = e.target; e.target = -1; e.dir = 0; e.state = 'idle';
      openDoors(e);
    }
  }
}

function openDoors(e) {
  e.state = 'door'; e.doorTimer = DOOR_TIME;
  e.el.style.background = 'rgba(255,255,255,0.15)';
  handleExchange(e);
}
function closeDoors(e) {
  e.el.style.background = 'var(--card-bg)';
  e.state   = e.pressing ? 'moving' : 'idle';
  if (!e.pressing) e.dir = 0;
}
function handleExchange(e) {
  e.pax = e.pax.filter(p => {
    if (p.dest !== e.floor) return true;
    const pts = p.type === 'vip' ? 5 : 1;
    G.score += pts; G.delivered++;
    addLog(`✓ ${p.type === 'vip' ? '⭐VIP' : '👤'} → ${e.floor + 1}F  +${pts}`);
    return false;
  });
  G.passengers.forEach(p => {
    if (p.waiting && p.start === e.floor && e.pax.length < CAPACITY) {
      if (e.dir === 0 || p.dir === e.dir) {
        p.waiting = false; e.pax.push(p);
      }
    }
  });
}

/* ══════════════════════════════
   SPAWN
══════════════════════════════ */
function spawnPax(now) {
  if (now - G.spawnTimer < SPAWN_MS) return;
  G.spawnTimer = now;
  const start = Math.floor(Math.random() * NUM_FLOORS);
  let dest; do { dest = Math.floor(Math.random() * NUM_FLOORS); } while (dest === start);
  G.passengers.push({
    id: G.uid++, start, dest,
    dir: dest > start ? 1 : -1,
    type: Math.random() < 0.15 ? 'vip' : 'normal',
    waiting: true,
  });
}

/* ══════════════════════════════
   RENDER
══════════════════════════════ */
function posElev(e) {
  const scrollH = NUM_FLOORS * FLOOR_H;
  e.el.style.top = (scrollH - e.pixelY - FLOOR_H + (FLOOR_H - ELEV_H) / 2) + 'px';
}

function render() {
  G.elevators.forEach(e => {
    posElev(e);
    document.getElementById(`ecnt-${e.id}`).textContent = e.pax.length;
    document.getElementById(`edir-${e.id}`).textContent =
      e.dir === 1 ? '▲' : e.dir === -1 ? '▼' : '—';
  });

  for (let f = 0; f < NUM_FLOORS; f++) {
    const w    = document.getElementById(`fwait-${f}`);
    const here = G.passengers.filter(p => p.waiting && p.start === f);
    w.innerHTML = here.map(p =>
      `<div class="pax-fig ${p.type === 'vip' ? 'pax-vip' : ''}">
         <div class="pax-head"></div>
         <div class="pax-body"></div>
         <div class="pax-dest">${p.dest + 1}</div>
       </div>`
    ).join('');
  }

  document.getElementById('score-val').textContent     = G.score;
  document.getElementById('delivered-val').textContent = G.delivered;

  const remain = Math.max(0, GAME_DURATION - G.elapsed);
  const s = Math.floor(remain / 1000);
  document.getElementById('time-val').textContent =
    `${String(Math.floor(s / 60)).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}`;

  if (remain <= 0 && !G.gameOver) endGame();
}

/* ══════════════════════════════
   LOG
══════════════════════════════ */
function addLog(msg) {
  G.logs.unshift(msg);
  document.getElementById('log-area').innerHTML =
    G.logs.slice(0, 15).map(m => `<div class="log-item">${m}</div>`).join('');
}
function toggleLog() {
  document.getElementById('log-panel').classList.toggle('open');
}

/* ══════════════════════════════
   GAME OVER
══════════════════════════════ */
function endGame() {
  G.gameOver = true;
  const s = Math.floor(G.elapsed / 1000);
  document.getElementById('go-stats').innerHTML =
    `<div>得分 <span style="color:var(--gold)">${G.score}</span></div>` +
    `<div>送達 <span style="color:var(--green)">${G.delivered}</span> 人</div>` +
    `<div>時間 ${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}</div>`;
  document.getElementById('gameover-overlay').classList.add('show');
}

/* ══════════════════════════════
   GAME LOOP
══════════════════════════════ */
function loop(now) {
  if (G.gameOver) return;
  if (!G.lastTime) G.lastTime = now;
  const dt = Math.min(now - G.lastTime, 100);
  G.lastTime = now; G.elapsed += dt;
  spawnPax(now);
  G.elevators.forEach(e => updateElev(e, dt));
  render();
  requestAnimationFrame(loop);
}

/* ══════════════════════════════
   BUTTON EVENTS（同時支援 touch & mouse）
══════════════════════════════ */
function bindBtn(id, onDown, onUp) {
  const btn = document.getElementById(id);
  const down = ev => { ev.preventDefault(); onDown(); };
  const up   = ()  => onUp();
  btn.addEventListener('mousedown',  down);
  btn.addEventListener('touchstart', down, { passive: false });
  btn.addEventListener('mouseup',    up);
  btn.addEventListener('touchend',   up);
  btn.addEventListener('mouseleave', up);
}

bindBtn('btn-up',   () => pressUp(true),   () => pressUp(false));
bindBtn('btn-down', () => pressDown(true),  () => pressDown(false));
document.getElementById('btn-stop').addEventListener('click', () =>
  snapStop(G.elevators[G.selectedElev]));

/* ══════════════════════════════
   SCROLL TO MIDDLE ON INIT
══════════════════════════════ */
function scrollToMiddle() {
  const sc = document.getElementById('building-scroll');
  sc.scrollTop = (sc.scrollHeight - sc.clientHeight) / 2;
}

/* ══════════════════════════════
   RESIZE SUPPORT
══════════════════════════════ */
function rebuildLayout() {
  buildFloors();
  buildElevators();
  selectElev(G.selectedElev);
}
window.addEventListener('resize', () => {
  if (!G.gameOver) rebuildLayout();
});

/* ══════════════════════════════
   START
══════════════════════════════ */
initState();
buildFloors();
buildElevators();
selectElev(0);
scrollToMiddle();
requestAnimationFrame(loop);
</script>
</body>
</html>
