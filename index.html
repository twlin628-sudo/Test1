<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電梯帝國</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0d0f14;
  --bg2:    #13161e;
  --bg3:    #1a1e28;
  --bg4:    #222736;
  --border: rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.14);
  --text:   #e8eaf0;
  --text2:  #8a90a8;
  --text3:  #555c78;
  --accent: #4fc3f7;
  --gold:   #ffc107;
  --green:  #4caf50;
  --red:    #ef5350;
  --orange: #ff9800;
  --mono: 'Share Tech Mono', monospace;
  --sans: 'Noto Sans TC', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg); color: var(--text);
  font-family: var(--sans); font-size: 13px;
  display: flex; flex-direction: column; height: 100vh;
}

/* ── TOPBAR ── */
#topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 16px;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#game-title { font-family: var(--mono); font-size: 15px; color: var(--accent); letter-spacing: 3px; }
.top-stat {
  display: flex; align-items: center; gap: 6px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 12px;
}
.top-stat-label { font-size: 10px; color: var(--text3); font-family: var(--mono); }
.top-stat-val   { font-size: 15px; font-weight: 700; font-family: var(--mono); }
#score-val     { color: var(--accent); }
#time-val      { color: var(--text2); font-size: 13px; }
#delivered-val { color: var(--green); }

/* ── MAIN ── */
#main { display: flex; flex: 1; overflow: hidden; }

/* ── BUILDING COL ── */
#building-col {
  display: flex; flex-direction: column;
  background: var(--bg2); border-right: 1px solid var(--border);
  flex-shrink: 0; position: relative;
}
#building-scroll { overflow-y: auto; overflow-x: hidden; flex: 1; }
#building-scroll::-webkit-scrollbar { width: 4px; }
#building-scroll::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }
#building { position: relative; }

/* ── FLOORS ── */
.floor-row {
  height: 52px; display: flex; align-items: center;
  border-bottom: 1px solid var(--border); position: relative;
  cursor: pointer; user-select: none; transition: background 0.1s;
}
.floor-row:hover { background: rgba(79,195,247,0.05); }
.floor-num {
  font-family: var(--mono); font-size: 11px; color: var(--text3);
  width: 30px; text-align: right; padding-right: 6px; flex-shrink: 0;
}
.floor-arrows {
  width: 18px; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; gap: 1px;
}
.arrow-up   { color: var(--green); font-size: 10px; line-height: 1; }
.arrow-down { color: var(--red);   font-size: 10px; line-height: 1; }
.floor-waiting {
  flex: 1; display: flex; align-items: center; gap: 4px;
  padding: 0 8px; overflow: hidden; min-width: 80px;
}

/* ── PAX FIGURE ── */
.pax-fig { display: flex; flex-direction: column; align-items: center; }
.pax-head { width: 8px; height: 8px; border-radius: 50%; }
.pax-body { width: 10px; height: 11px; border-radius: 3px 3px 0 0; }
.pax-dest { font-family: var(--mono); font-size: 8px; color: var(--text3); margin-top: 1px; }
.pax-normal .pax-head, .pax-normal .pax-body { background: #4fc3f7; }
.pax-vip    .pax-head, .pax-vip    .pax-body { background: var(--gold); }

/* ── ELEVATOR LAYER ── */
#elev-layer { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 5; }
.elev-car {
  position: absolute; border-radius: 5px; border: 1.5px solid;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; pointer-events: all; cursor: pointer;
  transition: box-shadow 0.2s;
}
.elev-car.selected { box-shadow: 0 0 0 2px #fff, 0 0 14px rgba(255,255,255,0.25); }
.elev-car.door-open { animation: doorpulse 0.6s; }
@keyframes doorpulse { 0%{opacity:0.6} 50%{opacity:1} 100%{opacity:1} }
.elev-id  { font-family: var(--mono); font-size: 9px; font-weight: 700; opacity: 0.85; }
.elev-cnt { font-family: var(--mono); font-size: 10px; opacity: 0.75; }
.elev-dir { font-size: 12px; line-height: 1; }

/* ── RIGHT PANEL ── */
#right-panel {
  width: 220px; flex-shrink: 0; background: var(--bg2);
  border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden;
}
.panel-section { border-bottom: 1px solid var(--border); padding: 10px 12px; }
.panel-title {
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px;
}

/* ── ELEVATOR CARDS ── */
.elev-card {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 10px; margin-bottom: 6px;
  cursor: pointer; transition: border-color 0.2s;
}
.elev-card:hover { border-color: var(--border2); }
.elev-card.selected { border-color: var(--accent); background: rgba(79,195,247,0.06); }
.elev-card-top {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px;
}
.elev-card-name { font-family: var(--mono); font-size: 11px; font-weight: 700; }
.elev-card-floor { font-family: var(--mono); font-size: 10px; color: var(--text2); }
.elev-card-pax  { font-size: 11px; color: var(--text2); }

/* ── CONTROLS ── */
#ctrl-section { padding: 12px; border-bottom: 1px solid var(--border); }
#ctrl-btn-row { display: flex; gap: 8px; margin-bottom: 8px; }
.ctrl-btn {
  flex: 1; padding: 12px 0; border-radius: 7px; border: 1.5px solid;
  font-family: var(--mono); font-size: 20px; cursor: pointer;
  background: transparent; transition: background 0.12s, transform 0.08s;
  display: flex; align-items: center; justify-content: center;
}
.ctrl-btn.active { transform: scale(0.93); }
#btn-up   { border-color: var(--green); color: var(--green); }
#btn-up.active   { background: rgba(76,175,80,0.2); }
#btn-down { border-color: var(--red);   color: var(--red);   }
#btn-down.active { background: rgba(239,83,80,0.2); }
#btn-stop {
  width: 100%; padding: 7px 0; border-radius: 6px;
  border: 1px solid var(--border2); color: var(--text2);
  background: transparent; font-family: var(--mono); font-size: 11px;
  cursor: pointer; transition: background 0.12s;
}
#btn-stop:hover { background: var(--bg3); color: var(--text); }
.ctrl-hint {
  font-size: 10px; color: var(--text3); text-align: center;
  margin-top: 7px; font-family: var(--mono);
}

/* ── LOG ── */
#log-header { padding: 10px 12px 4px; border-bottom: none; }
#log-area {
  flex: 1; overflow-y: auto; padding: 4px 12px 8px;
  display: flex; flex-direction: column; gap: 2px;
}
#log-area::-webkit-scrollbar { width: 3px; }
#log-area::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }
.log-item {
  font-size: 10px; font-family: var(--mono); padding: 2px 0;
  border-bottom: 1px solid var(--border); color: var(--text2);
}
.log-item.good { color: var(--green); }
.log-item.gold { color: var(--gold); }
.log-item.info { color: var(--accent); }

/* ── FLOAT ── */
.float-score {
  position: fixed; pointer-events: none; font-family: var(--mono);
  font-size: 14px; font-weight: 700; z-index: 999;
  animation: floatUp 1s ease-out forwards;
}
@keyframes floatUp {
  0%   { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-40px); }
}

/* ── GAME OVER ── */
#gameover-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.82);
  z-index: 600; display: none; align-items: center; justify-content: center;
}
#gameover-overlay.open { display: flex; }
#gameover-box {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 12px; padding: 40px 48px; text-align: center; min-width: 300px;
}
#gameover-box h1 {
  font-family: var(--mono); font-size: 26px; color: var(--accent);
  letter-spacing: 4px; margin-bottom: 6px;
}
#gameover-box p { color: var(--text2); font-size: 12px; margin-bottom: 20px; }
#gameover-stats { margin-bottom: 24px; display: flex; flex-direction: column; gap: 8px; }
#gameover-stats span { font-family: var(--mono); font-size: 14px; }
#gameover-stats span b { color: var(--accent); }
#restart-btn {
  padding: 11px 36px; background: var(--accent); color: var(--bg);
  border: none; border-radius: 7px; font-family: var(--mono); font-size: 13px;
  cursor: pointer; letter-spacing: 1px; transition: opacity 0.2s;
}
#restart-btn:hover { opacity: 0.85; }
</style>
</head>
<body>

<div id="topbar">
  <div id="game-title">電梯帝國</div>
  <div class="top-stat">
    <span class="top-stat-label">分數</span>
    <span class="top-stat-val" id="score-val">0</span>
  </div>
  <div class="top-stat">
    <span class="top-stat-label">送達</span>
    <span class="top-stat-val" id="delivered-val">0</span>
  </div>
  <div class="top-stat">
    <span class="top-stat-label">時間</span>
    <span class="top-stat-val" id="time-val">00:00</span>
  </div>
</div>

<div id="main">
  <div id="building-col">
    <div id="building-scroll">
      <div id="building"></div>
    </div>
    <div id="elev-layer"></div>
  </div>

  <div id="right-panel">
    <div class="panel-section">
      <div class="panel-title">電梯狀態</div>
      <div id="elev-cards"></div>
    </div>

    <div id="ctrl-section">
      <div class="panel-title">操控選中電梯</div>
      <div id="ctrl-btn-row">
        <button class="ctrl-btn" id="btn-up">▲</button>
        <button class="ctrl-btn" id="btn-down">▼</button>
      </div>
      <button id="btn-stop">■ 停止 / 開門</button>
      <div class="ctrl-hint">方向鍵操控 · 數字 1/2 切換梯 · 空白停止</div>
    </div>

    <div id="log-header">
      <div class="panel-title" style="margin-bottom:0">動態紀錄</div>
    </div>
    <div id="log-area"></div>
  </div>
</div>

<div id="gameover-overlay">
  <div id="gameover-box">
    <h1>RESULT</h1>
    <p>本次電梯調度結束</p>
    <div id="gameover-stats"></div>
    <button id="restart-btn">再玩一次</button>
  </div>
</div>

<script>
// ═══════════════════════════
//  CONFIG
// ═══════════════════════════
const NUM_FLOORS   = 10;
const NUM_ELEVS    = 2;
const CAPACITY     = 6;
const FLOOR_H      = 52;
const ELEV_W       = 44;
const ELEV_H       = FLOOR_H - 8;
const PAX_AREA_W   = 160;   // pax display width
const SHAFT_W      = 52;
const SPEED        = FLOOR_H * 2.4;  // px/sec
const DOOR_TIME    = 750;            // ms
const SPAWN_MS     = 1800;           // ms between spawns

const COLORS = ['#4fc3f7','#4caf50','#ffc107','#ff6b9d'];
const NAMES  = ['A','B','C','D'];

// ═══════════════════════════
//  STATE
// ═══════════════════════════
let G = {};

function initState() {
  G = {
    score: 0, delivered: 0,
    elapsed: 0, lastTime: null, gameOver: false,
    passengers: [], elevators: [],
    selectedElev: 0,
    spawnTimer: 0, uid: 0,
    logs: [],
    // keyboard tracking
    keyUp: false, keyDown: false,
  };
}

// ═══════════════════════════
//  BUILD UI
// ═══════════════════════════
function buildFloors() {
  const bld = document.getElementById('building');
  bld.innerHTML = '';
  const totalW = 30 + PAX_AREA_W + NUM_ELEVS * SHAFT_W;
  bld.style.width = totalW + 'px';
  document.getElementById('building-col').style.width = totalW + 'px';

  for (let f = NUM_FLOORS - 1; f >= 0; f--) {
    const row = document.createElement('div');
    row.className = 'floor-row';
    row.id = `floor-${f}`;
    row.style.width = totalW + 'px';
    row.innerHTML = `
      <div class="floor-num">${f + 1}</div>
      <div class="floor-arrows" id="farrow-${f}"></div>
      <div class="floor-waiting" id="fwait-${f}"></div>
    `;
    row.addEventListener('click', () => clickFloor(f));
    bld.appendChild(row);
  }
}

function buildElevators() {
  const layer = document.getElementById('elev-layer');
  layer.innerHTML = '';
  G.elevators = [];

  [0, NUM_FLOORS - 1].forEach((sf, i) => {
    const e = {
      id: i, color: COLORS[i],
      floor: sf, pixelY: sf * FLOOR_H,
      target: -1,    // -1 = no click target
      dir: 0,        // -1 | 0 | 1
      pressing: false, // button held
      state: 'idle', // idle | moving | door
      doorTimer: 0,
      pax: [],
    };

    const x = 30 + PAX_AREA_W + i * SHAFT_W + (SHAFT_W - ELEV_W) / 2;
    const car = document.createElement('div');
    car.className = 'elev-car' + (i === 0 ? ' selected' : '');
    car.id = `ecar-${i}`;
    car.style.cssText = `border-color:${e.color};background:${rgba(e.color,.12)};color:${e.color};width:${ELEV_W}px;height:${ELEV_H}px;left:${x}px;`;
    car.innerHTML = `<div class="elev-dir" id="edir-${i}">─</div><div class="elev-id">${NAMES[i]}</div><div class="elev-cnt" id="ecnt-${i}">0/${CAPACITY}</div>`;
    car.addEventListener('click', ev => { ev.stopPropagation(); selectElev(i); });
    layer.appendChild(car);

    e.el = car;
    posElev(e);
    G.elevators.push(e);
  });

  buildElevCards();
}

function buildElevCards() {
  const area = document.getElementById('elev-cards');
  area.innerHTML = '';
  G.elevators.forEach((e, i) => {
    const c = document.createElement('div');
    c.className = 'elev-card' + (i === G.selectedElev ? ' selected' : '');
    c.id = `ecard-${i}`;
    c.innerHTML = `
      <div class="elev-card-top">
        <span class="elev-card-name" style="color:${e.color}">${NAMES[i]} 號梯</span>
        <span class="elev-card-floor" id="ecfloor-${i}">${e.floor+1}F</span>
      </div>
      <div class="elev-card-pax" id="ecpax-${i}">載客：0 / ${CAPACITY}</div>`;
    c.addEventListener('click', () => selectElev(i));
    area.appendChild(c);
  });
}

// ═══════════════════════════
//  SELECTION
// ═══════════════════════════
function selectElev(i) {
  G.selectedElev = i;
  document.querySelectorAll('.elev-car').forEach((el, idx) => el.classList.toggle('selected', idx === i));
  document.querySelectorAll('.elev-card').forEach((el, idx) => el.classList.toggle('selected', idx === i));
}

// ═══════════════════════════
//  CONTROLS
// ═══════════════════════════
function pressUp(on) {
  const e = G.elevators[G.selectedElev];
  if (!e || e.state === 'door') return;
  e.pressing = on;
  if (on) {
    e.dir = 1;
    e.target = -1;
    e.state = 'moving';
    document.getElementById('btn-up').classList.toggle('active', true);
  } else {
    document.getElementById('btn-up').classList.toggle('active', false);
    if (e.dir === 1) snapStop(e);
  }
}

function pressDown(on) {
  const e = G.elevators[G.selectedElev];
  if (!e || e.state === 'door') return;
  e.pressing = on;
  if (on) {
    e.dir = -1;
    e.target = -1;
    e.state = 'moving';
    document.getElementById('btn-down').classList.toggle('active', true);
  } else {
    document.getElementById('btn-down').classList.toggle('active', false);
    if (e.dir === -1) snapStop(e);
  }
}

function snapStop(e) {
  e.floor  = Math.round(e.pixelY / FLOOR_H);
  e.pixelY = e.floor * FLOOR_H;
  e.dir    = 0;
  e.pressing = false;
  openDoors(e);
}

function clickFloor(f) {
  const e = G.elevators[G.selectedElev];
  if (!e || e.state === 'door') return;
  if (f === e.floor) { openDoors(e); return; }
  e.target  = f;
  e.dir     = f > e.floor ? 1 : -1;
  e.pressing = false;
  e.state   = 'moving';
}

// ═══════════════════════════
//  ELEVATOR PHYSICS
// ═══════════════════════════
function updateElev(e, dt) {
  if (e.state === 'door') {
    e.doorTimer -= dt;
    if (e.doorTimer <= 0) closeDoors(e);
    return;
  }
  if (e.state !== 'moving') return;

  const px = SPEED * (dt / 1000);
  e.pixelY += e.dir * px;

  // Clamp to building
  const maxPx = (NUM_FLOORS - 1) * FLOOR_H;
  e.pixelY = Math.max(0, Math.min(maxPx, e.pixelY));
  e.floor  = Math.round(e.pixelY / FLOOR_H);

  // Hit wall while pressing
  if (e.pressing) {
    if ((e.dir === 1 && e.pixelY >= maxPx) || (e.dir === -1 && e.pixelY <= 0)) {
      snapStop(e);
      return;
    }
  }

  // Click-to-go: reached target
  if (!e.pressing && e.target >= 0) {
    const targetPx = e.target * FLOOR_H;
    if ((e.dir === 1 && e.pixelY >= targetPx) || (e.dir === -1 && e.pixelY <= targetPx)) {
      e.pixelY = targetPx;
      e.floor  = e.target;
      e.target = -1;
      e.dir    = 0;
      e.state  = 'idle';
      openDoors(e);
      return;
    }
  }

  // While moving, check if any passenger wants to drop off here
  if (e.pressing) {
    const f = Math.round(e.pixelY / FLOOR_H);
    const snap = Math.abs(e.pixelY - f * FLOOR_H) < 3;
    if (snap && e.pax.some(p => p.dest === f)) {
      e.pixelY = f * FLOOR_H;
      e.floor  = f;
      openDoors(e);
    }
  }
}

function openDoors(e) {
  e.state     = 'door';
  e.doorTimer = DOOR_TIME;
  e.el.classList.add('door-open');
  handleExchange(e);
}

function closeDoors(e) {
  e.el.classList.remove('door-open');
  e.state = e.pressing ? 'moving' : 'idle';
  if (!e.pressing) e.dir = 0;
}

function handleExchange(e) {
  // Drop off passengers
  e.pax = e.pax.filter(p => {
    if (p.dest !== e.floor) return true;
    const pts = p.type === 'vip' ? 3 : 1;
    G.score += pts;
    G.delivered++;
    addLog(`${p.type==='vip'?'⭐VIP ':''}到達 ${e.floor+1}F  +${pts}分`, p.type==='vip'?'gold':'good');
    floatScore(`+${pts}`, p.type==='vip'?'#ffc107':'#4fc3f7', e);
    return false;
  });

  // Board waiting passengers
  G.passengers.forEach(p => {
    if (!p.waiting || p.start !== e.floor) return;
    if (e.pax.length >= CAPACITY) return;
    if (e.dir !== 0 && p.dir !== e.dir) return; // direction mismatch
    p.waiting = false;
    e.pax.push(p);
    addLog(`上梯 ${p.start+1}F → ${p.dest+1}F`, 'info');
  });
}

// ═══════════════════════════
//  SPAWN
// ═══════════════════════════
function spawnPax(now) {
  if (now - G.spawnTimer < SPAWN_MS) return;
  G.spawnTimer = now;
  const start = Math.floor(Math.random() * NUM_FLOORS);
  let dest;
  do { dest = Math.floor(Math.random() * NUM_FLOORS); } while (dest === start);
  G.passengers.push({
    id: G.uid++, start, dest,
    dir: dest > start ? 1 : -1,
    type: Math.random() < 0.12 ? 'vip' : 'normal',
    waiting: true,
  });
}

// ═══════════════════════════
//  RENDER
// ═══════════════════════════
function posElev(e) {
  const totalH = NUM_FLOORS * FLOOR_H;
  e.el.style.top = (totalH - e.pixelY - FLOOR_H + 4) + 'px';
}

function renderElevs() {
  G.elevators.forEach(e => {
    posElev(e);
    document.getElementById(`ecnt-${e.id}`).textContent = `${e.pax.length}/${CAPACITY}`;
    const de = document.getElementById(`edir-${e.id}`);
    de.textContent = e.dir === 1 ? '▲' : e.dir === -1 ? '▼' : '─';
    de.style.color = e.dir === 1 ? 'var(--green)' : e.dir === -1 ? 'var(--red)' : e.color;
    // card
    const fe = document.getElementById(`ecfloor-${e.id}`);
    const pe = document.getElementById(`ecpax-${e.id}`);
    if (fe) fe.textContent = `${e.floor+1}F`;
    if (pe) pe.textContent = `載客：${e.pax.length} / ${CAPACITY}`;
  });
}

function renderPax() {
  for (let f = 0; f < NUM_FLOORS; f++) {
    const w = document.getElementById(`fwait-${f}`);
    const a = document.getElementById(`farrow-${f}`);
    if (!w) continue;
    const here = G.passengers.filter(p => p.waiting && p.start === f);
    w.innerHTML = here.map(p => `
      <div class="pax-fig pax-${p.type}">
        <div class="pax-head"></div>
        <div class="pax-body"></div>
        <div class="pax-dest">${p.dest+1}F</div>
      </div>`).join('');
    if (a) {
      const up = here.some(p => p.dir === 1);
      const dn = here.some(p => p.dir === -1);
      a.innerHTML = (up ? '<div class="arrow-up">▲</div>' : '') + (dn ? '<div class="arrow-down">▼</div>' : '');
    }
  }
}

function renderHUD() {
  document.getElementById('score-val').textContent     = G.score;
  document.getElementById('delivered-val').textContent = G.delivered;
  const s = Math.floor(G.elapsed / 1000);
  document.getElementById('time-val').textContent =
    `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

// ═══════════════════════════
//  LOG + FLOAT
// ═══════════════════════════
function addLog(msg, type = '') {
  G.logs.unshift({ msg, type });
  if (G.logs.length > 40) G.logs.pop();
  const area = document.getElementById('log-area');
  area.innerHTML = G.logs.slice(0, 20).map(l =>
    `<div class="log-item ${l.type}">${l.msg}</div>`
  ).join('');
}

function floatScore(text, color, e) {
  const r = e.el.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'float-score';
  el.style.cssText = `left:${r.left+r.width/2-10}px;top:${r.top}px;color:${color}`;
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// ═══════════════════════════
//  UTILITY
// ═══════════════════════════
function rgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ═══════════════════════════
//  MAIN LOOP
// ═══════════════════════════
function loop(now) {
  if (G.gameOver) return;
  if (!G.lastTime) G.lastTime = now;
  const dt = Math.min(now - G.lastTime, 80);
  G.lastTime = now;
  G.elapsed += dt;

  spawnPax(now);
  G.elevators.forEach(e => updateElev(e, dt));
  renderElevs();
  renderPax();
  renderHUD();

  requestAnimationFrame(loop);
}

// ═══════════════════════════
//  EVENTS
// ═══════════════════════════

// UP button
const btnUp = document.getElementById('btn-up');
btnUp.addEventListener('mousedown',  () => pressUp(true));
btnUp.addEventListener('mouseup',    () => pressUp(false));
btnUp.addEventListener('mouseleave', () => pressUp(false));
btnUp.addEventListener('touchstart', e => { e.preventDefault(); pressUp(true); }, { passive: false });
btnUp.addEventListener('touchend',   e => { e.preventDefault(); pressUp(false); }, { passive: false });

// DOWN button
const btnDn = document.getElementById('btn-down');
btnDn.addEventListener('mousedown',  () => pressDown(true));
btnDn.addEventListener('mouseup',    () => pressDown(false));
btnDn.addEventListener('mouseleave', () => pressDown(false));
btnDn.addEventListener('touchstart', e => { e.preventDefault(); pressDown(true); }, { passive: false });
btnDn.addEventListener('touchend',   e => { e.preventDefault(); pressDown(false); }, { passive: false });

// STOP button
document.getElementById('btn-stop').addEventListener('click', () => {
  const e = G.elevators[G.selectedElev];
  if (!e) return;
  pressUp(false);
  pressDown(false);
  snapStop(e);
});

// Keyboard
const keysHeld = new Set();
document.addEventListener('keydown', ev => {
  if (keysHeld.has(ev.key)) return;
  keysHeld.add(ev.key);
  if (ev.key === 'ArrowUp')   { ev.preventDefault(); pressUp(true); }
  if (ev.key === 'ArrowDown') { ev.preventDefault(); pressDown(true); }
  if (ev.key === ' ')         { ev.preventDefault(); snapStop(G.elevators[G.selectedElev]); }
  if (ev.key === '1') selectElev(0);
  if (ev.key === '2') selectElev(1);
});
document.addEventListener('keyup', ev => {
  keysHeld.delete(ev.key);
  if (ev.key === 'ArrowUp')   pressUp(false);
  if (ev.key === 'ArrowDown') pressDown(false);
});

// Restart
document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('gameover-overlay').classList.remove('open');
  document.getElementById('log-area').innerHTML = '';
  initState();
  buildFloors();
  buildElevators();
  selectElev(0);
  addLog('遊戲重新開始！', 'info');
  G.lastTime = null;
  requestAnimationFrame(loop);
});

// ═══════════════════════════
//  START
// ═══════════════════════════
initState();
buildFloors();
buildElevators();
selectElev(0);
addLog('歡迎來到電梯帝國！', 'info');
addLog('按住 ▲▼ 連續移動，放開即停止開門', 'info');
addLog('點擊樓層列 → 直達指定層', 'info');
addLog('鍵盤：方向鍵 / 空白停止 / 1·2 切換', 'info');
requestAnimationFrame(loop);
</script>
</body>
