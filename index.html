<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>電梯帝國</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Warm concrete + amber industrial palette */
  --bg:      #1c1710;
  --bg2:     #231e14;
  --bg3:     #2d2618;
  --bg4:     #3a3020;
  --border:  rgba(255,220,120,0.08);
  --border2: rgba(255,220,120,0.18);
  --text:    #f0e8d0;
  --text2:   #a89870;
  --text3:   #6b5c3a;
  --accent:  #f5a623;   /* amber */
  --amber2:  #c47d0e;
  --green:   #6fcf97;
  --red:     #eb5757;
  --steel:   #8fa8b8;   /* steel blue for elevator */
  --mono: 'Share Tech Mono', monospace;
  --sans: 'Noto Sans TC', sans-serif;
  --phone-w: 390px;
  --phone-h: 844px;
  --floor-h: 88px;
  --elev-w:  58px;
  --elev-h:  80px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  background: #0e0b06;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
}
body {
  width: var(--phone-w);
  height: var(--phone-h);
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  display: flex; flex-direction: column;
  overflow: hidden;
  position: relative;
  border-radius: 20px;
  box-shadow:
    0 0 0 1px rgba(245,166,35,0.15),
    0 0 40px rgba(245,166,35,0.06),
    0 32px 80px rgba(0,0,0,0.9);
}

/* ── TOPBAR ── */
#topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px 10px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border2);
  flex-shrink: 0;
  position: relative;
}
#topbar::after {
  content: '';
  position: absolute; bottom: 0; left: 16px; right: 16px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(245,166,35,0.3), transparent);
}
#game-title {
  font-family: var(--mono); font-size: 14px; color: var(--accent);
  letter-spacing: 3px; text-transform: uppercase;
}
.hstats { display: flex; gap: 8px; }
.hstat {
  display: flex; flex-direction: column; align-items: center;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 6px; padding: 4px 10px; min-width: 60px;
}
.hstat-lbl { font-size: 9px; color: var(--text3); font-family: var(--mono); letter-spacing: 1px; }
.hstat-val { font-family: var(--mono); font-size: 15px; font-weight: 700; }
#s-score  { color: var(--accent); }
#s-floors { color: var(--steel); }
#s-time   { color: var(--text2); font-size: 13px; }

/* ── FLOOR INDICATOR ── */
#floor-indicator {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 16px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#fi-label  { font-size: 10px; color: var(--text3); font-family: var(--mono); letter-spacing: 1px; }
#fi-floor  { font-family: var(--mono); font-size: 24px; color: var(--accent); font-weight: 700; }
#fi-pax    { font-family: var(--mono); font-size: 13px; color: var(--text2); }
#fi-dir    { font-size: 22px; }
#fi-state  { font-size: 11px; color: var(--text3); font-family: var(--mono); text-align: right; }

/* ── GAME AREA ── */
#game-area { flex: 1; position: relative; overflow: hidden; }

#floors-strip {
  position: absolute; top: 0; left: 0; width: 100%;
  will-change: transform;
}

/* ── FLOOR ROW ── */
.floor-row {
  width: 100%; height: var(--floor-h);
  display: flex; align-items: center;
  border-bottom: 1px solid var(--border);
  position: relative; user-select: none; cursor: pointer;
  transition: background 0.12s;
}
.floor-row:active { background: rgba(245,166,35,0.04); }
.floor-row.is-current {
  background: rgba(245,166,35,0.07);
  border-bottom-color: rgba(245,166,35,0.25);
  border-left: 3px solid var(--accent);
}
.floor-num {
  font-family: var(--mono); font-size: 15px; color: var(--text3);
  width: 36px; text-align: right; padding-right: 6px; flex-shrink: 0;
}
.floor-row.is-current .floor-num { color: var(--accent); }
.floor-arrows {
  width: 20px; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.arr-up   { font-size: 11px; color: var(--green); line-height: 1; }
.arr-down { font-size: 11px; color: var(--red);   line-height: 1; }
.floor-pax {
  flex: 1; display: flex; align-items: center; gap: 5px;
  padding: 0 8px; overflow: hidden;
}
.floor-shaft-gap { width: 76px; flex-shrink: 0; }

/* ── PAX FIGURES ── */
.pax-fig { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
.pax-head { width: 10px; height: 10px; border-radius: 50%; background: var(--text2); }
.pax-body { width: 12px; height: 13px; border-radius: 3px 3px 0 0; background: var(--text2); }
.pax-dest { font-family: var(--mono); font-size: 9px; color: var(--text3); margin-top: 1px; }

/* ── ELEVATOR SHAFT ── */
#elev-shaft {
  position: absolute; right: 10px; top: 0; bottom: 0; width: 68px;
  pointer-events: none;
}
#elev-shaft::before {
  content: ''; position: absolute;
  left: 50%; top: 0; bottom: 0; width: 3px;
  background: repeating-linear-gradient(
    to bottom,
    var(--border2) 0px, var(--border2) 8px,
    transparent 8px, transparent 16px
  );
  transform: translateX(-50%);
}
#elev-car {
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: var(--elev-w); height: var(--elev-h);
  border-radius: 6px;
  border: 2px solid var(--steel);
  background: rgba(143,168,184,0.14);
  color: var(--steel);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  pointer-events: all;
  transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.07);
}
#elev-car.door-open {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(245,166,35,0.12);
  box-shadow: 0 0 18px rgba(245,166,35,0.35), inset 0 1px 0 rgba(255,255,255,0.07);
  animation: doorpulse 0.4s;
}
@keyframes doorpulse { 0%{opacity:0.5} 60%{opacity:1} 100%{opacity:1} }
#elev-dir { font-size: 15px; line-height: 1; }
#elev-id  { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 1px; }
#elev-cnt { font-family: var(--mono); font-size: 10px; opacity: 0.75; }

/* ── OVERLAY SHARED ── */
.game-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--bg2);
  border-top: 1px solid var(--border2);
  z-index: 30; display: none; flex-direction: column;
  max-height: 56%; border-radius: 16px 16px 0 0; overflow: hidden;
}
.game-overlay.open { display: flex; }
.overlay-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 16px 9px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.overlay-title { font-family: var(--mono); font-size: 11px; color: var(--text3); letter-spacing: 2px; }
.overlay-close {
  font-size: 15px; color: var(--text3); background: none; border: none;
  cursor: pointer; padding: 2px 6px; border-radius: 4px;
  transition: color 0.1s, background 0.1s;
}
.overlay-close:active { background: var(--bg3); color: var(--text); }

/* log list */
#log-list {
  overflow-y: auto; padding: 8px 14px 14px;
  display: flex; flex-direction: column; gap: 5px;
}
#log-list::-webkit-scrollbar { width: 3px; }
#log-list::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }
.log-pill {
  font-family: var(--mono); font-size: 12px;
  padding: 5px 10px; border-radius: 5px; width: fit-content;
}
.log-good { background: rgba(111,207,151,0.13); color: var(--green); }
.log-gold { background: rgba(245,166,35,0.13);  color: var(--accent); }
.log-info { background: rgba(143,168,184,0.13); color: var(--steel); }

/* pax list */
#pax-list {
  overflow-y: auto; padding: 12px 14px 16px;
  display: flex; flex-direction: column; gap: 7px;
}
.pax-list-row {
  display: flex; align-items: center; gap: 12px;
  font-family: var(--mono); font-size: 14px;
  padding: 8px 12px;
  background: var(--bg3); border-radius: 8px;
  border: 1px solid var(--border);
}
.pax-list-icon { font-size: 15px; opacity: 0.7; }
.pax-list-dest { color: var(--accent); font-weight: 700; font-size: 17px; }
.pax-list-label { color: var(--text3); font-size: 11px; }
#pax-overlay-empty {
  font-family: var(--mono); font-size: 13px; color: var(--text3);
  text-align: center; padding: 24px;
}

/* ── PAUSE TINT ── */
#pause-tint {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 25; display: none;
  align-items: center; justify-content: center;
}
#pause-tint.on { display: flex; }
#pause-label {
  font-family: var(--mono); font-size: 12px;
  color: rgba(245,166,35,0.4); letter-spacing: 4px;
}

/* ── CONTROLS ── */
#controls {
  flex-shrink: 0;
  background: var(--bg2);
  border-top: 1px solid var(--border2);
  /* Key fix: padding-bottom keeps buttons away from iPhone home bar
     but doesn't push them too close to the bottom edge */
  padding: 10px 14px 14px;
  display: flex; flex-direction: column; gap: 8px;
}

/* action row: log + pax + door */
#action-row { display: flex; gap: 8px; }
#btn-log, #btn-pax {
  height: 48px; width: 68px; flex-shrink: 0;
  border-radius: 9px;
  border: 1.5px solid var(--border2);
  color: var(--text3); background: var(--bg3);
  font-family: var(--mono); font-size: 11px;
  cursor: pointer; line-height: 1.3;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
#btn-log.active  { border-color: var(--accent); color: var(--accent); background: rgba(245,166,35,0.1); }
#btn-pax.active  { border-color: var(--steel);  color: var(--steel);  background: rgba(143,168,184,0.1); }
#btn-log:active, #btn-pax:active { opacity: 0.7; }

#btn-stop {
  flex: 1; height: 48px;
  border-radius: 9px;
  border: 1.5px solid var(--amber2);
  color: var(--accent); background: rgba(245,166,35,0.1);
  font-family: var(--mono); font-size: 16px; font-weight: 700;
  cursor: pointer; letter-spacing: 1px;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
#btn-stop.door-is-open {
  border-color: var(--green);
  color: var(--green);
  background: rgba(111,207,151,0.1);
}
#btn-stop:active { opacity: 0.7; }

/* up / down row */
#ctrl-row { display: flex; gap: 8px; }
.ctrl-btn {
  flex: 1; height: 64px;
  border-radius: 12px; border: 2px solid;
  font-family: var(--mono); font-size: 28px;
  cursor: pointer; background: transparent;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.1s, transform 0.07s;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}
.ctrl-btn:active { transform: scale(0.94); }
#btn-up   { border-color: var(--green); color: var(--green); }
#btn-up.active   { background: rgba(111,207,151,0.15); }
#btn-down { border-color: var(--red); color: var(--red); }
#btn-down.active { background: rgba(235,87,87,0.15); }

.ctrl-hint {
  font-size: 10px; color: var(--text3);
  font-family: var(--mono); text-align: center; letter-spacing: 0.5px;
}

/* ── FLOAT SCORE ── */
.float-score {
  position: fixed; pointer-events: none;
  font-family: var(--mono); font-size: 17px; font-weight: 700;
  z-index: 999;
  animation: floatUp 1s ease-out forwards;
}
@keyframes floatUp {
  0%   { opacity:1; transform:translateY(0) scale(1); }
  100% { opacity:0; transform:translateY(-50px) scale(0.8); }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="game-title">ELEVATOR</div>
  <div class="hstats">
    <div class="hstat">
      <div class="hstat-lbl">SCORE</div>
      <div class="hstat-val" id="s-score">0</div>
    </div>
    <div class="hstat">
      <div class="hstat-lbl">FLOORS</div>
      <div class="hstat-val" id="s-floors">0</div>
    </div>
    <div class="hstat">
      <div class="hstat-lbl">TIME</div>
      <div class="hstat-val" id="s-time">00:00</div>
    </div>
  </div>
</div>

<!-- FLOOR INDICATOR -->
<div id="floor-indicator">
  <div>
    <div id="fi-label">CURRENT FLOOR</div>
    <div id="fi-floor">1F</div>
  </div>
  <div id="fi-dir" style="color:var(--text3)">─</div>
  <div>
    <div id="fi-pax">0 / 10 人</div>
    <div id="fi-state">待機</div>
  </div>
</div>

<!-- GAME AREA -->
<div id="game-area">
  <div id="floors-strip"></div>
  <div id="elev-shaft">
    <div id="elev-car">
      <div id="elev-dir">─</div>
      <div id="elev-id">A</div>
      <div id="elev-cnt">0/10</div>
    </div>
  </div>

  <!-- Log overlay panel -->
  <div id="log-overlay" class="game-overlay">
    <div class="overlay-header">
      <div class="overlay-title">RECORD</div>
      <button id="log-overlay-close" class="overlay-close">✕</button>
    </div>
    <div id="log-list"></div>
  </div>

  <!-- Pax overlay panel -->
  <div id="pax-overlay" class="game-overlay">
    <div class="overlay-header">
      <div class="overlay-title">電梯乘客</div>
      <button id="pax-overlay-close" class="overlay-close">✕</button>
    </div>
    <div id="pax-list"></div>
  </div>

  <!-- Pause tint -->
  <div id="pause-tint" class=""><div id="pause-label">PAUSED</div></div>
</div>

<!-- CONTROLS: ▲▼ on top, action row below — keeps hands away from home bar -->
<div id="controls">
  <div id="ctrl-row">
    <button class="ctrl-btn" id="btn-up">▲</button>
    <button class="ctrl-btn" id="btn-down">▼</button>
  </div>
  <div id="action-row">
    <button id="btn-log">📋<br>紀錄</button>
    <button id="btn-pax">🧍<br>乘客</button>
    <button id="btn-stop">開門</button>
  </div>
  <div class="ctrl-hint">按住 ▲▼ 移動 · 開門/關門上下客 · 紀錄/乘客暫停遊戲</div>
</div>

<script>
// ═══════════════════════════════
//  CONSTANTS
// ═══════════════════════════════
const NUM_FLOORS = 20;
const CAPACITY   = 10;
const FLOOR_H    = 88;        // matches CSS --floor-h
const SPEED      = FLOOR_H * 2.4;  // px / sec
const DOOR_TIME  = 900;       // ms doors stay open
const SPAWN_MS   = 1800;      // ms between spawns

// How many floors are visible at once (5) → game-area height = 5 * FLOOR_H
// We set game-area flex:1 and floors are FLOOR_H each, so 5 fill nicely.

// ═══════════════════════════════
//  STATE
// ═══════════════════════════════
let G = {};

function initState() {
  G = {
    floor:      0,
    pixelY:     0,
    dir:        0,
    pressing:   false,
    state:      'idle',   // idle | moving | door
    doorTimer:  0,
    target:     -1,
    pax:        [],

    score:      0,
    floorsCount:0,
    elapsed:    0,
    lastTime:   null,
    passengers: [],
    spawnTimer: 0,
    uid:        0,
    logs:       [],

    lastCountedFloor: 0,
    paused: false,   // true when log or pax overlay is open
    doorOpen: false, // explicit door toggle state
  };
}

// ═══════════════════════════════
//  BUILD DOM
// ═══════════════════════════════
function buildFloors() {
  const strip = document.getElementById('floors-strip');
  strip.innerHTML = '';
  strip.style.height = (NUM_FLOORS * FLOOR_H) + 'px';

  // top of strip = highest floor
  for (let f = NUM_FLOORS - 1; f >= 0; f--) {
    const row = document.createElement('div');
    row.className = 'floor-row';
    row.id = `fr-${f}`;
    row.innerHTML = `
      <div class="floor-num">${f + 1}</div>
      <div class="floor-arrows" id="fa-${f}"></div>
      <div class="floor-pax" id="fp-${f}"></div>
      <div class="floor-shaft-gap"></div>`;
    row.addEventListener('click', () => clickFloor(f));
    strip.appendChild(row);
  }
}

// ═══════════════════════════════
//  SCROLL: keep current floor centred
// ═══════════════════════════════
function applyScroll() {
  const gameH = document.getElementById('game-area').clientHeight;
  // strip top for floor f: (NUM_FLOORS - 1 - f) * FLOOR_H
  // centre of current pixelY in strip coords:
  const stripPos = (NUM_FLOORS - 1) * FLOOR_H - G.pixelY + FLOOR_H / 2;
  const offset   = gameH / 2 - stripPos;
  document.getElementById('floors-strip').style.transform = `translateY(${offset}px)`;
}

// ═══════════════════════════════
//  CONTROLS
// ═══════════════════════════════
function pressUp(on) {
  if (G.state === 'door') return;
  document.getElementById('btn-up').classList.toggle('active', on);
  if (on) {
    G.dir = 1; G.pressing = true; G.target = -1; G.state = 'moving';
  } else {
    G.pressing = false;
    if (G.dir === 1 && G.state === 'moving') snapStop();
  }
}

function pressDown(on) {
  if (G.state === 'door') return;
  document.getElementById('btn-down').classList.toggle('active', on);
  if (on) {
    G.dir = -1; G.pressing = true; G.target = -1; G.state = 'moving';
  } else {
    G.pressing = false;
    if (G.dir === -1 && G.state === 'moving') snapStop();
  }
}

function snapStop() {
  G.floor    = Math.round(G.pixelY / FLOOR_H);
  G.pixelY   = G.floor * FLOOR_H;
  G.dir      = 0;
  G.pressing = false;
  G.state    = 'idle';
  // no auto door open — player must press the button
}

function clickFloor(f) {
  if (G.state === 'door') return;
  if (f === G.floor) return; // same floor, do nothing (player uses btn-stop to open)
  G.target   = f;
  G.pressing = false;
  G.dir      = f > G.floor ? 1 : -1;
  G.state    = 'moving';
}

// ═══════════════════════════════
//  DOOR TOGGLE
// ═══════════════════════════════

// ═══════════════════════════════
//  ELEVATOR PHYSICS
// ═══════════════════════════════
function updateElev(dt) {
  // Door state: player controls open/close, no auto-close
  if (G.state === 'door') return;
  if (G.state !== 'moving') return;

  const px = SPEED * (dt / 1000);
  G.pixelY += G.dir * px;

  const maxPx = (NUM_FLOORS - 1) * FLOOR_H;
  G.pixelY = Math.max(0, Math.min(maxPx, G.pixelY));

  // Count floor crossings
  const newFloor = Math.round(G.pixelY / FLOOR_H);
  if (newFloor !== G.lastCountedFloor) {
    const diff = Math.abs(newFloor - G.lastCountedFloor);
    G.floorsCount += diff;
    G.lastCountedFloor = newFloor;
  }
  G.floor = newFloor;

  // Wall stop while pressing
  if (G.pressing) {
    if ((G.dir === 1 && G.pixelY >= maxPx) || (G.dir === -1 && G.pixelY <= 0)) {
      snapStop();
    }
    return;
  }

  // Click-to-go arrived
  if (G.target >= 0) {
    const tPx = G.target * FLOOR_H;
    if ((G.dir === 1 && G.pixelY >= tPx) || (G.dir === -1 && G.pixelY <= tPx)) {
      G.pixelY = tPx;
      G.floor  = G.target;
      G.target = -1;
      G.dir    = 0;
      G.state  = 'idle';
      // no auto open — player presses button
    }
  }
}

function doToggleDoor() {
  if (G.paused) return;
  if (G.doorOpen) {
    // Close door — do NOT board anyone, just close
    closeDoors();
  } else {
    // Snap stop if moving, then open
    if (G.state === 'moving') {
      G.floor   = Math.round(G.pixelY / FLOOR_H);
      G.pixelY  = G.floor * FLOOR_H;
      G.dir     = 0;
      G.pressing = false;
      G.target  = -1;
    }
    openDoors();
  }
}

function openDoors() {
  G.doorOpen  = true;
  G.state     = 'door';
  G.doorTimer = 0;   // no auto-close timer; player closes manually
  document.getElementById('elev-car').classList.add('door-open');
  document.getElementById('btn-stop').classList.add('door-is-open');
  document.getElementById('btn-stop').textContent = '關門';
  // Drop off passengers whose destination is current floor
  G.pax = G.pax.filter(p => {
    if (p.dest !== G.floor) return true;
    G.score++;
    addLog(`到達 ${G.floor + 1}F  +1分`, 'good');
    floatScore('+1', '#38bdf8');
    return false;
  });
  // Board waiting passengers
  G.passengers.forEach(p => {
    if (!p.waiting || p.start !== G.floor) return;
    if (G.pax.length >= CAPACITY) return;
    p.waiting = false;
    G.pax.push(p);
    addLog(`上梯 ${p.start + 1}F → ${p.dest + 1}F`, 'info');
  });
}

function closeDoors() {
  G.doorOpen = false;
  document.getElementById('elev-car').classList.remove('door-open');
  document.getElementById('btn-stop').classList.remove('door-is-open');
  document.getElementById('btn-stop').textContent = '開門';
  G.state    = 'idle';
  G.dir      = 0;
  G.pressing = false;
  // No boarding on close — intentional
}

// ═══════════════════════════════
//  SPAWN
// ═══════════════════════════════
function spawnPax(now) {
  if (now - G.spawnTimer < SPAWN_MS) return;
  G.spawnTimer = now;
  const start = Math.floor(Math.random() * NUM_FLOORS);
  let dest;
  do { dest = Math.floor(Math.random() * NUM_FLOORS); } while (dest === start);
  G.passengers.push({
    id: G.uid++, start, dest,
    dir: dest > start ? 1 : -1,
    type: 'normal',
    waiting: true,
  });
}

// ═══════════════════════════════
//  RENDER
// ═══════════════════════════════
function renderAll() {
  applyScroll();

  // Current floor highlight
  document.querySelectorAll('.floor-row').forEach(r => r.classList.remove('is-current'));
  const cur = document.getElementById(`fr-${G.floor}`);
  if (cur) cur.classList.add('is-current');

  // Elevator car
  const isDoor = G.state === 'door';
  const dirEl  = document.getElementById('elev-dir');
  dirEl.textContent = G.dir === 1 ? '▲' : G.dir === -1 ? '▼' : (isDoor ? '⊡' : '─');
  dirEl.style.color = G.dir === 1 ? 'var(--green)' :
                      G.dir === -1 ? 'var(--red)' :
                      isDoor ? 'var(--green)' : 'var(--accent)';
  document.getElementById('elev-cnt').textContent = `${G.pax.length}/${CAPACITY}`;

  // Floor indicator bar
  document.getElementById('fi-floor').textContent = `${G.floor + 1}F`;
  document.getElementById('fi-pax').textContent   = `${G.pax.length} / ${CAPACITY} 人`;
  const stMap = { idle:'待機', moving: G.dir === 1 ? '上行' : '下行', door:'開門中' };
  document.getElementById('fi-state').textContent = stMap[G.state] || '待機';
  const fiDir = document.getElementById('fi-dir');
  fiDir.textContent = G.dir === 1 ? '▲' : G.dir === -1 ? '▼' : '─';
  fiDir.style.color = G.dir === 1 ? 'var(--green)' : G.dir === -1 ? 'var(--red)' : 'var(--text3)';

  // Passengers on floors
  for (let f = 0; f < NUM_FLOORS; f++) {
    const pArea = document.getElementById(`fp-${f}`);
    const aArea = document.getElementById(`fa-${f}`);
    if (!pArea) continue;
    const here = G.passengers.filter(p => p.waiting && p.start === f);
    pArea.innerHTML = here.slice(0, 7).map(p => `
      <div class="pax-fig pax-normal">
        <div class="pax-head"></div>
        <div class="pax-body"></div>
        <div class="pax-dest">${p.dest + 1}F</div>
      </div>`).join('');
    if (aArea) {
      const up = here.some(p => p.dir === 1);
      const dn = here.some(p => p.dir === -1);
      aArea.innerHTML =
        (up ? '<div class="arr-up">▲</div>'   : '') +
        (dn ? '<div class="arr-down">▼</div>' : '');
    }
  }

  // HUD
  document.getElementById('s-score').textContent  = G.score;
  document.getElementById('s-floors').textContent = G.floorsCount;
  const s = Math.floor(G.elapsed / 1000);
  document.getElementById('s-time').textContent =
    `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
}

// ═══════════════════════════════
//  LOG + FLOAT
// ═══════════════════════════════
function addLog(msg, type = '') {
  G.logs.unshift({ msg, type });
  if (G.logs.length > 50) G.logs.pop();
  const list = document.getElementById('log-list');
  list.innerHTML = G.logs.map(l =>
    `<div class="log-pill log-${l.type}">${l.msg}</div>`
  ).join('');
}

function floatScore(text, color) {
  const car = document.getElementById('elev-car');
  const r   = car.getBoundingClientRect();
  const el  = document.createElement('div');
  el.className = 'float-score';
  el.style.cssText = `left:${r.left + r.width / 2 - 14}px;top:${r.top - 8}px;color:${color}`;
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1050);
}

// ═══════════════════════════════
//  LOOP
// ═══════════════════════════════
function loop(now) {
  if (G.paused) {
    G.lastTime = now;   // reset so dt doesn't spike on resume
    requestAnimationFrame(loop);
    return;
  }
  if (!G.lastTime) G.lastTime = now;
  const dt = Math.min(now - G.lastTime, 80);
  G.lastTime = now;
  G.elapsed += dt;

  spawnPax(now);
  updateElev(dt);
  renderAll();

  requestAnimationFrame(loop);
}

// ═══════════════════════════════
//  EVENTS
// ═══════════════════════════════

// ▲ button — hold to move up
const bUp = document.getElementById('btn-up');
bUp.addEventListener('mousedown',   () => pressUp(true));
bUp.addEventListener('mouseup',     () => pressUp(false));
bUp.addEventListener('mouseleave',  () => pressUp(false));
bUp.addEventListener('touchstart',  e => { e.preventDefault(); pressUp(true);  }, { passive: false });
bUp.addEventListener('touchend',    e => { e.preventDefault(); pressUp(false); }, { passive: false });
bUp.addEventListener('touchcancel', () => pressUp(false));

// ▼ button — hold to move down
const bDn = document.getElementById('btn-down');
bDn.addEventListener('mousedown',   () => pressDown(true));
bDn.addEventListener('mouseup',     () => pressDown(false));
bDn.addEventListener('mouseleave',  () => pressDown(false));
bDn.addEventListener('touchstart',  e => { e.preventDefault(); pressDown(true);  }, { passive: false });
bDn.addEventListener('touchend',    e => { e.preventDefault(); pressDown(false); }, { passive: false });
bDn.addEventListener('touchcancel', () => pressDown(false));

// ── PAUSE helpers ──
function setPaused(on) {
  G.paused = on;
  const tint = document.getElementById('pause-tint');
  tint.classList.toggle('on', on);
}

// ── Open/Close door button ──
document.getElementById('btn-stop').addEventListener('click', () => doToggleDoor());
document.getElementById('btn-stop').addEventListener('touchend', e => {
  e.preventDefault(); doToggleDoor();
}, { passive: false });

// ── Log button toggle ──
const btnLog    = document.getElementById('btn-log');
const logOverlay = document.getElementById('log-overlay');
const paxOverlay = document.getElementById('pax-overlay');

function closeAllOverlays() {
  logOverlay.classList.remove('open');
  paxOverlay.classList.remove('open');
  btnLog.classList.remove('active');
  document.getElementById('btn-pax').classList.remove('active');
  setPaused(false);
}

function toggleLog() {
  const willOpen = !logOverlay.classList.contains('open');
  closeAllOverlays();
  if (willOpen) {
    logOverlay.classList.add('open');
    btnLog.classList.add('active');
    setPaused(true);
  }
}
btnLog.addEventListener('click', toggleLog);
document.getElementById('log-overlay-close').addEventListener('click', closeAllOverlays);

// ── Pax button toggle ──
const btnPax = document.getElementById('btn-pax');
function renderPaxOverlay() {
  const list = document.getElementById('pax-list');
  if (G.pax.length === 0) {
    list.innerHTML = '<div id="pax-overlay-empty">電梯內無乘客</div>';
    return;
  }
  list.innerHTML = G.pax.map((p, i) => `
    <div class="pax-list-row">
      <span class="pax-list-icon">🧍</span>
      <span class="pax-list-dest">${p.dest + 1}F</span>
      <span class="pax-list-label">目的地</span>
    </div>`).join('');
}
function togglePax() {
  const willOpen = !paxOverlay.classList.contains('open');
  closeAllOverlays();
  if (willOpen) {
    renderPaxOverlay();
    paxOverlay.classList.add('open');
    btnPax.classList.add('active');
    setPaused(true);
  }
}
btnPax.addEventListener('click', togglePax);
document.getElementById('pax-overlay-close').addEventListener('click', closeAllOverlays);

// ── Keyboard ──
const keysHeld = new Set();
document.addEventListener('keydown', ev => {
  if (keysHeld.has(ev.key)) return;
  keysHeld.add(ev.key);
  if (ev.key === 'ArrowUp')   { ev.preventDefault(); pressUp(true); }
  if (ev.key === 'ArrowDown') { ev.preventDefault(); pressDown(true); }
  if (ev.key === ' ')         { ev.preventDefault(); doToggleDoor(); }
  if (ev.key === 'Escape')    closeAllOverlays();
});
document.addEventListener('keyup', ev => {
  keysHeld.delete(ev.key);
  if (ev.key === 'ArrowUp')   pressUp(false);
  if (ev.key === 'ArrowDown') pressDown(false);
});

// ═══════════════════════════════
//  START
// ═══════════════════════════════
initState();
buildFloors();
applyScroll();
addLog('按住 ▲▼ 移動電梯', 'info');
addLog('按「開門」手動上下乘客', 'info');
requestAnimationFrame(loop);
</script>
</body>
</html>
