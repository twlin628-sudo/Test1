<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>電梯帝國</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0b0e18;
  --bg2:     #121623;
  --bg3:     #1b2030;
  --bg4:     #242a3a;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.15);
  --text:    #e6eaf4;
  --text2:   #7a85a3;
  --text3:   #434d68;
  --accent:  #38bdf8;
  --gold:    #fbbf24;
  --green:   #34d399;
  --red:     #f87171;
  --mono: 'Share Tech Mono', monospace;
  --sans: 'Noto Sans TC', sans-serif;
  --phone-w: 390px;
  --phone-h: 844px;
  /* 5 floors visible → each floor = game-area-h / 5 */
  --floor-h: 88px;
  --elev-w:  56px;
  --elev-h:  80px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  background: #060810;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
}
body {
  width: var(--phone-w);
  height: var(--phone-h);
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  display: flex; flex-direction: column;
  overflow: hidden;
  position: relative;
  border-radius: 16px;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 24px 80px rgba(0,0,0,0.8);
}

/* ── TOPBAR ── */
#topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px 10px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#game-title { font-family: var(--mono); font-size: 15px; color: var(--accent); letter-spacing: 2px; }
.hstats { display: flex; gap: 8px; }
.hstat {
  display: flex; flex-direction: column; align-items: center;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 6px; padding: 4px 12px; min-width: 64px;
}
.hstat-lbl { font-size: 10px; color: var(--text3); font-family: var(--mono); letter-spacing: 1px; }
.hstat-val { font-family: var(--mono); font-size: 16px; font-weight: 700; }
#s-score { color: var(--accent); }
#s-floors { color: var(--gold); }
#s-time  { color: var(--text2); font-size: 13px; }

/* ── FLOOR INDICATOR ── */
#floor-indicator {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#fi-label  { font-size: 11px; color: var(--text3); font-family: var(--mono); }
#fi-floor  { font-family: var(--mono); font-size: 22px; color: var(--accent); font-weight: 700; }
#fi-pax    { font-family: var(--mono); font-size: 13px; color: var(--text2); }
#fi-dir    { font-size: 20px; }
#fi-state  { font-size: 11px; color: var(--text3); font-family: var(--mono); text-align: right; }

/* ── GAME AREA ── */
#game-area {
  flex: 1;
  position: relative;
  overflow: hidden;
}

#floors-strip {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  will-change: transform;
}

/* ── FLOOR ROW ── */
.floor-row {
  width: 100%;
  height: var(--floor-h);
  display: flex;
  align-items: center;
  border-bottom: 1px solid var(--border);
  position: relative;
  user-select: none;
  cursor: pointer;
  transition: background 0.1s;
}
.floor-row:active { background: rgba(56,189,248,0.04); }
.floor-row.is-current {
  background: rgba(56,189,248,0.07);
  border-bottom-color: rgba(56,189,248,0.22);
}
.floor-num {
  font-family: var(--mono); font-size: 14px; color: var(--text3);
  width: 34px; text-align: right; padding-right: 6px; flex-shrink: 0;
}
.floor-arrows {
  width: 20px; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.arr-up   { font-size: 11px; color: var(--green); line-height: 1; }
.arr-down { font-size: 11px; color: var(--red);   line-height: 1; }
.floor-pax {
  flex: 1;
  display: flex; align-items: center; gap: 5px;
  padding: 0 8px;
  overflow: hidden;
}
.floor-shaft-gap { width: 74px; flex-shrink: 0; }

/* ── PAX ── */
.pax-fig {
  display: flex; flex-direction: column; align-items: center; flex-shrink: 0;
}
.pax-head { width: 11px; height: 11px; border-radius: 50%; }
.pax-body { width: 13px; height: 14px; border-radius: 3px 3px 0 0; }
.pax-dest { font-family: var(--mono); font-size: 9px; color: var(--text3); margin-top: 1px; }
.pax-normal .pax-head,
.pax-normal .pax-body { background: var(--accent); }

/* ── ELEVATOR SHAFT (fixed) ── */
#elev-shaft {
  position: absolute;
  right: 10px; top: 0; bottom: 0;
  width: 66px;
  pointer-events: none;
}
#elev-shaft::before {
  content: '';
  position: absolute;
  left: 50%; top: 0; bottom: 0;
  width: 2px;
  background: var(--border2);
  transform: translateX(-50%);
}
#elev-car {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: var(--elev-w);
  height: var(--elev-h);
  border-radius: 8px;
  border: 2px solid var(--accent);
  background: rgba(56,189,248,0.13);
  color: var(--accent);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px;
  pointer-events: all;
  transition: box-shadow 0.3s;
}
#elev-car.door-open {
  box-shadow: 0 0 20px rgba(56,189,248,0.55);
  border-color: var(--green);
  color: var(--green);
  background: rgba(52,211,153,0.13);
  animation: doorpulse 0.5s;
}
@keyframes doorpulse { 0%{opacity:0.5} 50%{opacity:1} 100%{opacity:1} }
#elev-dir { font-size: 16px; line-height: 1; }
#elev-id  { font-family: var(--mono); font-size: 12px; font-weight: 700; opacity: 0.9; }
#elev-cnt { font-family: var(--mono); font-size: 11px; opacity: 0.8; }

/* ── LOG overlay panel ── */
#log-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--bg2);
  border-top: 1px solid var(--border2);
  z-index: 30;
  display: none;
  flex-direction: column;
  max-height: 55%;
  border-radius: 14px 14px 0 0;
  overflow: hidden;
}
#log-overlay.open { display: flex; }
#log-overlay-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#log-overlay-title { font-family: var(--mono); font-size: 11px; color: var(--text3); letter-spacing: 2px; }
#log-overlay-close { font-size: 14px; color: var(--text3); background: none; border: none; cursor: pointer; padding: 0 4px; }
#log-list {
  overflow-y: auto; padding: 8px 12px 12px;
  display: flex; flex-direction: column; gap: 4px;
}
#log-list::-webkit-scrollbar { width: 3px; }
#log-list::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }
.log-pill {
  font-family: var(--mono); font-size: 12px;
  padding: 5px 10px; border-radius: 6px;
  width: fit-content;
}
.log-good { background: rgba(52,211,153,0.15); color: var(--green); }
.log-gold { background: rgba(251,191,36,0.15); color: var(--gold); }
.log-info { background: rgba(56,189,248,0.12); color: var(--accent); }

/* ── CONTROLS ── */
#controls {
  flex-shrink: 0;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 14px 16px 24px;   /* more top padding so buttons sit higher */
  display: flex; flex-direction: column; gap: 10px;
}
#ctrl-row {
  display: flex; gap: 10px;
}
.ctrl-btn {
  flex: 1;
  height: 68px;
  border-radius: 12px;
  border: 2px solid;
  font-family: var(--mono);
  font-size: 30px;
  cursor: pointer;
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.1s, transform 0.08s;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}
.ctrl-btn:active { transform: scale(0.93); }
#btn-up   { border-color: var(--green); color: var(--green); }
#btn-up.active   { background: rgba(52,211,153,0.2); }
#btn-down { border-color: var(--red);   color: var(--red); }
#btn-down.active { background: rgba(248,113,113,0.2); }

#action-row {
  display: flex; gap: 10px;
}
#btn-log {
  height: 52px; width: 72px; flex-shrink: 0;
  border-radius: 10px;
  border: 2px solid var(--border2);
  color: var(--text2);
  background: transparent;
  font-family: var(--mono);
  font-size: 13px;
  cursor: pointer;
  letter-spacing: 0px;
  transition: background 0.1s, border-color 0.1s, color 0.1s;
  -webkit-tap-highlight-color: transparent;
  line-height: 1.2;
}
#btn-log.active {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(251,191,36,0.1);
}
#btn-log:active { background: var(--bg3); }
#btn-stop {
  flex: 1;
  height: 52px;
  border-radius: 10px;
  border: 2px solid var(--accent);
  color: var(--accent);
  background: rgba(56,189,248,0.08);
  font-family: var(--mono);
  font-size: 16px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: background 0.1s;
  -webkit-tap-highlight-color: transparent;
}
#btn-stop:active { background: rgba(56,189,248,0.22); }

.ctrl-hint {
  font-size: 11px; color: var(--text3);
  font-family: var(--mono); text-align: center;
}

/* ── FLOAT SCORE ── */
.float-score {
  position: fixed; pointer-events: none;
  font-family: var(--mono); font-size: 17px; font-weight: 700;
  z-index: 999;
  animation: floatUp 1s ease-out forwards;
}
@keyframes floatUp {
  0%   { opacity:1; transform:translateY(0) scale(1); }
  100% { opacity:0; transform:translateY(-52px) scale(0.8); }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="game-title">ELEVATOR</div>
  <div class="hstats">
    <div class="hstat">
      <div class="hstat-lbl">SCORE</div>
      <div class="hstat-val" id="s-score">0</div>
    </div>
    <div class="hstat">
      <div class="hstat-lbl">FLOORS</div>
      <div class="hstat-val" id="s-floors">0</div>
    </div>
    <div class="hstat">
      <div class="hstat-lbl">TIME</div>
      <div class="hstat-val" id="s-time">00:00</div>
    </div>
  </div>
</div>

<!-- FLOOR INDICATOR -->
<div id="floor-indicator">
  <div>
    <div id="fi-label">CURRENT FLOOR</div>
    <div id="fi-floor">1F</div>
  </div>
  <div id="fi-dir" style="color:var(--text3)">─</div>
  <div>
    <div id="fi-pax">0 / 10 人</div>
    <div id="fi-state">待機</div>
  </div>
</div>

<!-- GAME AREA -->
<div id="game-area">
  <div id="floors-strip"></div>
  <div id="elev-shaft">
    <div id="elev-car">
      <div id="elev-dir">─</div>
      <div id="elev-id">A</div>
      <div id="elev-cnt">0/10</div>
    </div>
  </div>

  <!-- Log overlay panel (inside game-area so it overlays floors) -->
  <div id="log-overlay">
    <div id="log-overlay-header">
      <div id="log-overlay-title">RECORD</div>
      <button id="log-overlay-close">✕</button>
    </div>
    <div id="log-list"></div>
  </div>
</div>

<!-- CONTROLS -->
<div id="controls">
  <div id="action-row">
    <button id="btn-log">📋<br>紀錄</button>
    <button id="btn-stop">開門</button>
  </div>
  <div id="ctrl-row">
    <button class="ctrl-btn" id="btn-up">▲</button>
    <button class="ctrl-btn" id="btn-down">▼</button>
  </div>
  <div class="ctrl-hint">按住 ▲▼ 移動 · 按開門手動上下客</div>
</div>

<script>
// ═══════════════════════════════
//  CONSTANTS
// ═══════════════════════════════
const NUM_FLOORS = 20;
const CAPACITY   = 10;
const FLOOR_H    = 88;        // matches CSS --floor-h
const SPEED      = FLOOR_H * 2.4;  // px / sec
const DOOR_TIME  = 900;       // ms doors stay open
const SPAWN_MS   = 1800;      // ms between spawns

// How many floors are visible at once (5) → game-area height = 5 * FLOOR_H
// We set game-area flex:1 and floors are FLOOR_H each, so 5 fill nicely.

// ═══════════════════════════════
//  STATE
// ═══════════════════════════════
let G = {};

function initState() {
  G = {
    floor:      0,
    pixelY:     0,
    dir:        0,
    pressing:   false,
    state:      'idle',   // idle | moving | door
    doorTimer:  0,
    target:     -1,
    pax:        [],

    score:      0,
    floorsCount:0,
    elapsed:    0,
    lastTime:   null,
    passengers: [],
    spawnTimer: 0,
    uid:        0,
    logs:       [],

    // track last counted floor for floor-move counter
    lastCountedFloor: 0,
  };
}

// ═══════════════════════════════
//  BUILD DOM
// ═══════════════════════════════
function buildFloors() {
  const strip = document.getElementById('floors-strip');
  strip.innerHTML = '';
  strip.style.height = (NUM_FLOORS * FLOOR_H) + 'px';

  // top of strip = highest floor
  for (let f = NUM_FLOORS - 1; f >= 0; f--) {
    const row = document.createElement('div');
    row.className = 'floor-row';
    row.id = `fr-${f}`;
    row.innerHTML = `
      <div class="floor-num">${f + 1}</div>
      <div class="floor-arrows" id="fa-${f}"></div>
      <div class="floor-pax" id="fp-${f}"></div>
      <div class="floor-shaft-gap"></div>`;
    row.addEventListener('click', () => clickFloor(f));
    strip.appendChild(row);
  }
}

// ═══════════════════════════════
//  SCROLL: keep current floor centred
// ═══════════════════════════════
function applyScroll() {
  const gameH = document.getElementById('game-area').clientHeight;
  // strip top for floor f: (NUM_FLOORS - 1 - f) * FLOOR_H
  // centre of current pixelY in strip coords:
  const stripPos = (NUM_FLOORS - 1) * FLOOR_H - G.pixelY + FLOOR_H / 2;
  const offset   = gameH / 2 - stripPos;
  document.getElementById('floors-strip').style.transform = `translateY(${offset}px)`;
}

// ═══════════════════════════════
//  CONTROLS
// ═══════════════════════════════
function pressUp(on) {
  if (G.state === 'door') return;
  document.getElementById('btn-up').classList.toggle('active', on);
  if (on) {
    G.dir = 1; G.pressing = true; G.target = -1; G.state = 'moving';
  } else {
    G.pressing = false;
    if (G.dir === 1 && G.state === 'moving') snapStop();
  }
}

function pressDown(on) {
  if (G.state === 'door') return;
  document.getElementById('btn-down').classList.toggle('active', on);
  if (on) {
    G.dir = -1; G.pressing = true; G.target = -1; G.state = 'moving';
  } else {
    G.pressing = false;
    if (G.dir === -1 && G.state === 'moving') snapStop();
  }
}

function snapStop() {
  G.floor    = Math.round(G.pixelY / FLOOR_H);
  G.pixelY   = G.floor * FLOOR_H;
  G.dir      = 0;
  G.pressing = false;
  G.state    = 'idle';
  // no auto door open — player must press the button
}

function clickFloor(f) {
  if (G.state === 'door') return;
  if (f === G.floor) return; // same floor, do nothing (player uses btn-stop to open)
  G.target   = f;
  G.pressing = false;
  G.dir      = f > G.floor ? 1 : -1;
  G.state    = 'moving';
}

function doOpenDoor() {
  // Called only by player pressing btn-stop
  if (G.state === 'moving') {
    // Snap to nearest floor first
    G.floor   = Math.round(G.pixelY / FLOOR_H);
    G.pixelY  = G.floor * FLOOR_H;
    G.dir     = 0;
    G.pressing = false;
    G.target  = -1;
  }
  if (G.state === 'door') return; // already open
  openDoors();
}

// ═══════════════════════════════
//  ELEVATOR PHYSICS
// ═══════════════════════════════
function updateElev(dt) {
  if (G.state === 'door') {
    G.doorTimer -= dt;
    if (G.doorTimer <= 0) closeDoors();
    return;
  }
  if (G.state !== 'moving') return;

  const px = SPEED * (dt / 1000);
  G.pixelY += G.dir * px;

  const maxPx = (NUM_FLOORS - 1) * FLOOR_H;
  G.pixelY = Math.max(0, Math.min(maxPx, G.pixelY));

  // Count floor crossings
  const newFloor = Math.round(G.pixelY / FLOOR_H);
  if (newFloor !== G.lastCountedFloor) {
    const diff = Math.abs(newFloor - G.lastCountedFloor);
    G.floorsCount += diff;
    G.lastCountedFloor = newFloor;
  }
  G.floor = newFloor;

  // Wall stop while pressing
  if (G.pressing) {
    if ((G.dir === 1 && G.pixelY >= maxPx) || (G.dir === -1 && G.pixelY <= 0)) {
      snapStop();
    }
    return;
  }

  // Click-to-go arrived
  if (G.target >= 0) {
    const tPx = G.target * FLOOR_H;
    if ((G.dir === 1 && G.pixelY >= tPx) || (G.dir === -1 && G.pixelY <= tPx)) {
      G.pixelY = tPx;
      G.floor  = G.target;
      G.target = -1;
      G.dir    = 0;
      G.state  = 'idle';
      // no auto open — player presses button
    }
  }
}

function openDoors() {
  G.state     = 'door';
  G.doorTimer = DOOR_TIME;
  document.getElementById('elev-car').classList.add('door-open');
  handleExchange();
}

function closeDoors() {
  document.getElementById('elev-car').classList.remove('door-open');
  G.state    = 'idle';
  G.dir      = 0;
  G.pressing = false;
}

function handleExchange() {
  // Drop off passengers at this floor
  G.pax = G.pax.filter(p => {
    if (p.dest !== G.floor) return true;
    G.score++;
    addLog(`到達 ${G.floor + 1}F  +1分`, 'good');
    floatScore('+1', '#38bdf8');
    return false;
  });

  // Board waiting passengers (no direction restriction when player manually opens)
  G.passengers.forEach(p => {
    if (!p.waiting || p.start !== G.floor) return;
    if (G.pax.length >= CAPACITY) return;
    p.waiting = false;
    G.pax.push(p);
    addLog(`上梯 ${p.start + 1}F → ${p.dest + 1}F`, 'info');
  });
}

// ═══════════════════════════════
//  SPAWN
// ═══════════════════════════════
function spawnPax(now) {
  if (now - G.spawnTimer < SPAWN_MS) return;
  G.spawnTimer = now;
  const start = Math.floor(Math.random() * NUM_FLOORS);
  let dest;
  do { dest = Math.floor(Math.random() * NUM_FLOORS); } while (dest === start);
  G.passengers.push({
    id: G.uid++, start, dest,
    dir: dest > start ? 1 : -1,
    type: 'normal',
    waiting: true,
  });
}

// ═══════════════════════════════
//  RENDER
// ═══════════════════════════════
function renderAll() {
  applyScroll();

  // Current floor highlight
  document.querySelectorAll('.floor-row').forEach(r => r.classList.remove('is-current'));
  const cur = document.getElementById(`fr-${G.floor}`);
  if (cur) cur.classList.add('is-current');

  // Elevator car
  const isDoor = G.state === 'door';
  const dirEl  = document.getElementById('elev-dir');
  dirEl.textContent = G.dir === 1 ? '▲' : G.dir === -1 ? '▼' : (isDoor ? '⊡' : '─');
  dirEl.style.color = G.dir === 1 ? 'var(--green)' :
                      G.dir === -1 ? 'var(--red)' :
                      isDoor ? 'var(--green)' : 'var(--accent)';
  document.getElementById('elev-cnt').textContent = `${G.pax.length}/${CAPACITY}`;

  // Floor indicator bar
  document.getElementById('fi-floor').textContent = `${G.floor + 1}F`;
  document.getElementById('fi-pax').textContent   = `${G.pax.length} / ${CAPACITY} 人`;
  const stMap = { idle:'待機', moving: G.dir === 1 ? '上行' : '下行', door:'開門中' };
  document.getElementById('fi-state').textContent = stMap[G.state] || '待機';
  const fiDir = document.getElementById('fi-dir');
  fiDir.textContent = G.dir === 1 ? '▲' : G.dir === -1 ? '▼' : '─';
  fiDir.style.color = G.dir === 1 ? 'var(--green)' : G.dir === -1 ? 'var(--red)' : 'var(--text3)';

  // Passengers on floors
  for (let f = 0; f < NUM_FLOORS; f++) {
    const pArea = document.getElementById(`fp-${f}`);
    const aArea = document.getElementById(`fa-${f}`);
    if (!pArea) continue;
    const here = G.passengers.filter(p => p.waiting && p.start === f);
    pArea.innerHTML = here.slice(0, 7).map(p => `
      <div class="pax-fig pax-normal">
        <div class="pax-head"></div>
        <div class="pax-body"></div>
        <div class="pax-dest">${p.dest + 1}F</div>
      </div>`).join('');
    if (aArea) {
      const up = here.some(p => p.dir === 1);
      const dn = here.some(p => p.dir === -1);
      aArea.innerHTML =
        (up ? '<div class="arr-up">▲</div>'   : '') +
        (dn ? '<div class="arr-down">▼</div>' : '');
    }
  }

  // HUD
  document.getElementById('s-score').textContent  = G.score;
  document.getElementById('s-floors').textContent = G.floorsCount;
  const s = Math.floor(G.elapsed / 1000);
  document.getElementById('s-time').textContent =
    `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
}

// ═══════════════════════════════
//  LOG + FLOAT
// ═══════════════════════════════
function addLog(msg, type = '') {
  G.logs.unshift({ msg, type });
  if (G.logs.length > 50) G.logs.pop();
  const list = document.getElementById('log-list');
  list.innerHTML = G.logs.map(l =>
    `<div class="log-pill log-${l.type}">${l.msg}</div>`
  ).join('');
}

function floatScore(text, color) {
  const car = document.getElementById('elev-car');
  const r   = car.getBoundingClientRect();
  const el  = document.createElement('div');
  el.className = 'float-score';
  el.style.cssText = `left:${r.left + r.width / 2 - 14}px;top:${r.top - 8}px;color:${color}`;
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1050);
}

// ═══════════════════════════════
//  LOOP
// ═══════════════════════════════
function loop(now) {
  if (!G.lastTime) G.lastTime = now;
  const dt = Math.min(now - G.lastTime, 80);
  G.lastTime = now;
  G.elapsed += dt;

  spawnPax(now);
  updateElev(dt);
  renderAll();

  requestAnimationFrame(loop);
}

// ═══════════════════════════════
//  EVENTS
// ═══════════════════════════════

// ▲ button — hold to move up
const bUp = document.getElementById('btn-up');
bUp.addEventListener('mousedown',   () => pressUp(true));
bUp.addEventListener('mouseup',     () => pressUp(false));
bUp.addEventListener('mouseleave',  () => pressUp(false));
bUp.addEventListener('touchstart',  e => { e.preventDefault(); pressUp(true);  }, { passive: false });
bUp.addEventListener('touchend',    e => { e.preventDefault(); pressUp(false); }, { passive: false });
bUp.addEventListener('touchcancel', () => pressUp(false));

// ▼ button — hold to move down
const bDn = document.getElementById('btn-down');
bDn.addEventListener('mousedown',   () => pressDown(true));
bDn.addEventListener('mouseup',     () => pressDown(false));
bDn.addEventListener('mouseleave',  () => pressDown(false));
bDn.addEventListener('touchstart',  e => { e.preventDefault(); pressDown(true);  }, { passive: false });
bDn.addEventListener('touchend',    e => { e.preventDefault(); pressDown(false); }, { passive: false });
bDn.addEventListener('touchcancel', () => pressDown(false));

// Open/Stop button
document.getElementById('btn-stop').addEventListener('click', () => doOpenDoor());
document.getElementById('btn-stop').addEventListener('touchend', e => {
  e.preventDefault(); doOpenDoor();
}, { passive: false });

// Log button toggle
const btnLog = document.getElementById('btn-log');
const logOverlay = document.getElementById('log-overlay');
function toggleLog() {
  const isOpen = logOverlay.classList.toggle('open');
  btnLog.classList.toggle('active', isOpen);
}
btnLog.addEventListener('click', toggleLog);
document.getElementById('log-overlay-close').addEventListener('click', toggleLog);

// Keyboard
const keysHeld = new Set();
document.addEventListener('keydown', ev => {
  if (keysHeld.has(ev.key)) return;
  keysHeld.add(ev.key);
  if (ev.key === 'ArrowUp')   { ev.preventDefault(); pressUp(true); }
  if (ev.key === 'ArrowDown') { ev.preventDefault(); pressDown(true); }
  if (ev.key === ' ')         { ev.preventDefault(); doOpenDoor(); }
});
document.addEventListener('keyup', ev => {
  keysHeld.delete(ev.key);
  if (ev.key === 'ArrowUp')   pressUp(false);
  if (ev.key === 'ArrowDown') pressDown(false);
});

// ═══════════════════════════════
//  START
// ═══════════════════════════════
initState();
buildFloors();
applyScroll();
addLog('按住 ▲▼ 移動電梯', 'info');
addLog('按「開門」手動上下乘客', 'info');
requestAnimationFrame(loop);
</script>
</body>
</html>
