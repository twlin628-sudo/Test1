<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>電梯帝國</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ── CUTE KAWAII THEME ── */
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
:root {
  --bg:     #fef6ff;
  --bg2:    #ffffff;
  --bg3:    #f7eeff;
  --bg4:    #ede0ff;
  --border: rgba(180,120,240,0.15);
  --border2:rgba(180,120,240,0.3);
  --text:   #3d2060;
  --text2:  #8060a8;
  --text3:  #b8a0d0;
  --accent: #c97bff;   /* lavender purple */
  --pink:   #ff7eb3;
  --green:  #5cce8a;
  --red:    #ff6b6b;
  --yellow: #ffd166;
  --blue:   #74b9ff;
  --sky:    #e8f4ff;
  --round:  16px;
  --shadow: 0 4px 0px rgba(180,120,240,0.25);
  --fun: 'Nunito', 'Noto Sans TC', sans-serif;
  --mono: 'Share Tech Mono', monospace;
  --phone-w: 390px;
  --phone-h: 844px;
  --floor-h: 88px;
  --elev-w:  60px;
  --elev-h:  82px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  background: #e8d5ff;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
}
body {
  width: var(--phone-w);
  height: var(--phone-h);
  background: var(--bg);
  color: var(--text);
  font-family: var(--fun);
  display: flex; flex-direction: column;
  overflow: hidden;
  position: relative;
  border-radius: 28px;
  box-shadow:
    0 0 0 3px #c97bff,
    0 0 0 6px #f0d9ff,
    0 20px 60px rgba(160,80,220,0.35);
}

/* cloud bg pattern */
body::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(ellipse 60px 40px at 10% 8%, rgba(201,123,255,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 80px 50px at 85% 5%, rgba(255,126,179,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 50px 35px at 50% 12%, rgba(116,185,255,0.07) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

/* ── TOPBAR ── */
#topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 10px;
  background: linear-gradient(135deg, #f0d5ff 0%, #ffd9f0 100%);
  border-bottom: 3px solid #e8b8ff;
  flex-shrink: 0; position: relative; z-index: 1;
}
#game-title {
  font-family: var(--fun); font-size: 18px; font-weight: 900;
  color: var(--accent); letter-spacing: 1px;
  text-shadow: 0 2px 0 rgba(180,80,240,0.2);
}
.hstats { display: flex; gap: 7px; }
.hstat {
  display: flex; flex-direction: column; align-items: center;
  background: white;
  border: 2px solid #e8b8ff;
  border-radius: 12px; padding: 4px 10px; min-width: 58px;
  box-shadow: 0 3px 0 #e0a8f8;
}
.hstat-lbl { font-size: 9px; color: var(--text3); font-weight: 800; letter-spacing: 0.5px; }
.hstat-val { font-family: var(--fun); font-size: 16px; font-weight: 900; }
#s-score  { color: var(--accent); }
#s-floors { color: var(--blue); }
#s-time   { color: var(--text2); font-size: 13px; }

/* ── FLOOR INDICATOR ── */
#floor-indicator {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px;
  background: #fff5ff;
  border-bottom: 2px solid var(--border2);
  flex-shrink: 0; position: relative; z-index: 1;
}
#fi-label  { font-size: 10px; color: var(--text3); font-weight: 800; letter-spacing: 0.5px; }
#fi-floor  { font-family: var(--fun); font-size: 26px; color: var(--accent); font-weight: 900; }
#fi-pax    { font-size: 13px; color: var(--text2); font-weight: 700; }
#fi-dir    { font-size: 22px; }
#fi-state  { font-size: 11px; color: var(--text3); font-weight: 800; text-align: right; }

/* ── TIME OF DAY indicator ── */
#time-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 5px 16px;
  flex-shrink: 0; position: relative; z-index: 1;
  transition: background 2s;
}
#time-bar-label { font-size: 11px; font-weight: 800; color: var(--text2); }
#time-bar-clock { font-size: 15px; font-weight: 900; color: var(--text); }
#time-bar-period { font-size: 11px; font-weight: 800; }
#time-progress-bg {
  flex: 1; height: 6px; background: rgba(180,120,240,0.15);
  border-radius: 4px; margin: 0 10px; overflow: hidden;
}
#time-progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }

/* ── FLOOR LABEL (name tag on each row) ── */
.floor-name {
  font-size: 9px; font-weight: 800;
  padding: 1px 5px; border-radius: 6px;
  white-space: nowrap; flex-shrink: 0;
  margin-right: 2px;
}

/* ── GAME AREA ── */
#game-area { flex: 1; position: relative; overflow: hidden; background: var(--bg); z-index: 1; }

#floors-strip {
  position: absolute; top: 0; left: 0; width: 100%;
  will-change: transform;
}

/* ── FLOOR ROW ── */
.floor-row {
  width: 100%; height: var(--floor-h);
  display: flex; align-items: center;
  border-bottom: 2px dashed rgba(201,123,255,0.18);
  position: relative; user-select: none; cursor: pointer;
  transition: background 0.12s;
}
.floor-row:active { background: rgba(201,123,255,0.06); }
.floor-row.is-current {
  background: linear-gradient(90deg, rgba(201,123,255,0.1), transparent 80%);
  border-bottom-color: rgba(201,123,255,0.35);
}
.floor-num {
  font-family: var(--fun); font-size: 15px; font-weight: 800; color: var(--text3);
  width: 36px; text-align: right; padding-right: 6px; flex-shrink: 0;
}
.floor-row.is-current .floor-num {
  color: var(--accent);
  background: linear-gradient(135deg,#f5d5ff,#ffd9f0);
  border-radius: 0 8px 8px 0;
  padding: 2px 6px 2px 4px;
}
.floor-arrows {
  width: 20px; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; gap: 1px;
}
.arr-up   { font-size: 11px; color: var(--green); line-height: 1; }
.arr-down { font-size: 11px; color: var(--red);   line-height: 1; }
.floor-pax {
  flex: 1; display: flex; align-items: center; gap: 5px;
  padding: 0 8px; overflow: hidden;
}
.floor-shaft-gap { width: 78px; flex-shrink: 0; }

/* ── PAX FIGURES (cute round style) ── */
.pax-fig { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
.pax-head {
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--pink); border: 1.5px solid white;
  box-shadow: 0 1px 3px rgba(255,100,150,0.4);
}
.pax-body {
  width: 14px; height: 13px; border-radius: 5px 5px 0 0;
  background: var(--accent); border: 1.5px solid white;
  box-shadow: 0 1px 3px rgba(180,80,240,0.3);
}
.pax-dest { font-size: 9px; color: var(--text3); font-weight: 800; margin-top: 1px; }

/* ── ELEVATOR SHAFT ── */
#elev-shaft {
  position: absolute; right: 10px; top: 0; bottom: 0; width: 70px;
  pointer-events: none;
}
/* cute dotted rail */
#elev-shaft::before {
  content: ''; position: absolute;
  left: 50%; top: 0; bottom: 0; width: 4px;
  background: repeating-linear-gradient(
    to bottom,
    #e0b8ff 0px, #e0b8ff 6px,
    transparent 6px, transparent 14px
  );
  border-radius: 2px;
  transform: translateX(-50%);
}
#elev-car {
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: var(--elev-w); height: var(--elev-h);
  border-radius: 18px;
  border: 3px solid #c97bff;
  background: linear-gradient(160deg, #f8e8ff 0%, #ffd9f5 100%);
  color: var(--accent);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2px;
  pointer-events: all;
  box-shadow: 0 4px 0 #c060e8, 0 6px 14px rgba(180,80,240,0.25);
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
}
#elev-car.door-open {
  border-color: var(--green);
  background: linear-gradient(160deg, #e8fff2 0%, #d0ffe8 100%);
  color: var(--green);
  box-shadow: 0 4px 0 #3aac6a, 0 0 20px rgba(92,206,138,0.4);
  animation: doorpulse 0.4s;
}
@keyframes doorpulse {
  0%  { transform: translate(-50%,-50%) scale(0.93); }
  60% { transform: translate(-50%,-50%) scale(1.04); }
  100%{ transform: translate(-50%,-50%) scale(1); }
}
#elev-dir { font-size: 16px; line-height: 1; }
#elev-id  { font-family: var(--fun); font-size: 13px; font-weight: 900; letter-spacing: 0.5px; }
#elev-cnt { font-size: 10px; font-weight: 800; opacity: 0.8; }

/* ── OVERLAY SHARED ── */
.game-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: white;
  border-top: 3px solid #e0b8ff;
  z-index: 30; display: none; flex-direction: column;
  max-height: 58%; border-radius: 20px 20px 0 0; overflow: hidden;
  box-shadow: 0 -4px 24px rgba(180,80,240,0.15);
}
.game-overlay.open { display: flex; }
.overlay-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 18px 10px;
  background: linear-gradient(135deg,#f8e8ff,#ffe8f8);
  border-bottom: 2px solid #f0d0ff;
  flex-shrink: 0;
}
.overlay-title {
  font-family: var(--fun); font-size: 15px; font-weight: 900;
  color: var(--accent);
}
.overlay-close {
  font-size: 16px; font-weight: 900; color: var(--text3);
  background: white; border: 2px solid #e0b8ff;
  border-radius: 50%; width: 28px; height: 28px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.1s;
}
.overlay-close:active { background: #f0d0ff; }

#log-list {
  overflow-y: auto; padding: 10px 16px 16px;
  display: flex; flex-direction: column; gap: 6px;
}
#log-list::-webkit-scrollbar { width: 4px; }
#log-list::-webkit-scrollbar-thumb { background: #e0b8ff; border-radius: 2px; }
.log-pill {
  font-size: 12px; font-weight: 800;
  padding: 6px 12px; border-radius: 20px; width: fit-content;
}
.log-good { background: #e8fff2; color: #2a9e5c; border: 1.5px solid #b0ecd0; }
.log-gold { background: #fff8e0; color: #b87c00; border: 1.5px solid #ffe080; }
.log-info { background: #f0e8ff; color: #8040c0; border: 1.5px solid #d8b8ff; }

#pax-list {
  overflow-y: auto; padding: 12px 16px 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.pax-list-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px;
  background: var(--bg3); border-radius: 14px;
  border: 2px solid #e8d0ff;
  box-shadow: 0 2px 0 #d8b8f0;
}
.pax-list-icon { font-size: 18px; }
.pax-list-dest { color: var(--accent); font-weight: 900; font-size: 20px; }
.pax-list-label { color: var(--text3); font-size: 12px; font-weight: 700; }
#pax-overlay-empty {
  font-size: 14px; font-weight: 800; color: var(--text3);
  text-align: center; padding: 28px;
}

/* ── PAUSE TINT ── */
#pause-tint {
  position: absolute; inset: 0;
  background: rgba(240,210,255,0.55);
  backdrop-filter: blur(2px);
  z-index: 25; display: none;
  align-items: center; justify-content: center;
}
#pause-tint.on { display: flex; }
#pause-label {
  font-family: var(--fun); font-size: 20px; font-weight: 900;
  color: var(--accent); letter-spacing: 3px;
  background: white; padding: 10px 24px; border-radius: 20px;
  border: 3px solid #e0b8ff;
  box-shadow: 0 4px 0 #c8a0e8;
}

/* ── CONTROLS ── */
#controls {
  flex-shrink: 0;
  background: linear-gradient(180deg, #f8eeff 0%, #fce8f8 100%);
  border-top: 3px solid #e8c0ff;
  /* Use safe-area-inset + fixed offset to keep clear of iPhone home bar */
  padding: 10px 14px 0;
  padding-bottom: max(28px, env(safe-area-inset-bottom, 28px));
  display: flex; flex-direction: column; gap: 8px;
  position: relative; z-index: 1;
}

/* ▲▼ big movement buttons */
#ctrl-row { display: flex; gap: 10px; }
.ctrl-btn {
  flex: 1; height: 62px;
  border-radius: 18px; border: 3px solid;
  font-size: 28px;
  cursor: pointer; background: white;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.07s, box-shadow 0.07s;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
  font-family: var(--fun);
}
.ctrl-btn:active { transform: scale(0.93) translateY(3px); box-shadow: none !important; }
#btn-up {
  border-color: var(--green); color: var(--green);
  box-shadow: 0 4px 0 #3aac6a;
}
#btn-up.active { background: #e8fff2; }
#btn-down {
  border-color: var(--red); color: var(--red);
  box-shadow: 0 4px 0 #cc4040;
}
#btn-down.active { background: #ffe8e8; }

/* action row: 紀錄 + 乘客 + 開門 */
#action-row { display: flex; gap: 8px; }
#btn-log, #btn-pax {
  height: 50px; width: 68px; flex-shrink: 0;
  border-radius: 14px; border: 2.5px solid #d8b8ff;
  color: var(--text2); background: white;
  font-family: var(--fun); font-size: 11px; font-weight: 800;
  cursor: pointer; line-height: 1.3;
  box-shadow: 0 3px 0 #c8a8e8;
  transition: transform 0.07s, box-shadow 0.07s;
  -webkit-tap-highlight-color: transparent;
}
#btn-log.active { border-color: var(--yellow); color: #b87c00; background: #fffbe8; box-shadow: 0 3px 0 #d4a800; }
#btn-pax.active { border-color: var(--accent); color: var(--accent); background: #f8e8ff; box-shadow: 0 3px 0 #b060d8; }
#btn-log:active, #btn-pax:active { transform: translateY(3px); box-shadow: none; }

#btn-stop {
  flex: 1; height: 50px;
  border-radius: 14px; border: 2.5px solid var(--accent);
  color: white; background: var(--accent);
  font-family: var(--fun); font-size: 17px; font-weight: 900;
  cursor: pointer; letter-spacing: 0.5px;
  box-shadow: 0 4px 0 #9040c0;
  transition: transform 0.07s, box-shadow 0.07s, background 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
#btn-stop.door-is-open {
  border-color: var(--green); background: var(--green);
  box-shadow: 0 4px 0 #3aac6a;
}
#btn-stop:active { transform: translateY(4px); box-shadow: none; }

.ctrl-hint {
  font-size: 10px; color: var(--text3); font-weight: 700;
  text-align: center; letter-spacing: 0.3px;
  padding-bottom: 4px;
}

/* ── FLOAT SCORE ── */
.float-score {
  position: fixed; pointer-events: none;
  font-family: var(--fun); font-size: 20px; font-weight: 900;
  z-index: 999;
  animation: floatUp 1s ease-out forwards;
  text-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
@keyframes floatUp {
  0%   { opacity:1; transform:translateY(0) scale(1.1); }
  100% { opacity:0; transform:translateY(-56px) scale(0.8); }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="game-title">🏢 電梯冒險</div>
  <div class="hstats">
    <div class="hstat">
      <div class="hstat-lbl">⭐分數</div>
      <div class="hstat-val" id="s-score">0</div>
    </div>
    <div class="hstat">
      <div class="hstat-lbl">🏠樓層</div>
      <div class="hstat-val" id="s-floors">0</div>
    </div>
    <div class="hstat">
      <div class="hstat-lbl">⏰時間</div>
      <div class="hstat-val" id="s-time">00:00</div>
    </div>
  </div>
</div>

<!-- FLOOR INDICATOR -->
<div id="floor-indicator">
  <div>
    <div id="fi-label">現在樓層</div>
    <div id="fi-floor">1F</div>
  </div>
  <div id="fi-dir" style="color:var(--text3)">─</div>
  <div>
    <div id="fi-pax">0 / 10 人</div>
    <div id="fi-state">待機中</div>
  </div>
</div>

<!-- TIME BAR -->
<div id="time-bar">
  <div id="time-bar-label">時間</div>
  <div id="time-bar-clock">07:00</div>
  <div id="time-progress-bg"><div id="time-progress-fill"></div></div>
  <div id="time-bar-period">🌅 早晨</div>
</div>

<!-- GAME AREA -->
<div id="game-area">
  <div id="floors-strip"></div>
  <div id="elev-shaft">
    <div id="elev-car">
      <div id="elev-dir">─</div>
      <div id="elev-id">A</div>
      <div id="elev-cnt">0/10</div>
    </div>
  </div>

  <!-- Log overlay panel -->
  <div id="log-overlay" class="game-overlay">
    <div class="overlay-header">
      <div class="overlay-title">RECORD</div>
      <button id="log-overlay-close" class="overlay-close">✕</button>
    </div>
    <div id="log-list"></div>
  </div>

  <!-- Pax overlay panel -->
  <div id="pax-overlay" class="game-overlay">
    <div class="overlay-header">
      <div class="overlay-title">電梯乘客</div>
      <button id="pax-overlay-close" class="overlay-close">✕</button>
    </div>
    <div id="pax-list"></div>
  </div>

  <!-- Pause tint -->
  <div id="pause-tint" class=""><div id="pause-label">PAUSED</div></div>
</div>

<!-- CONTROLS: ▲▼ on top, action row below -->
<div id="controls">
  <div id="ctrl-row">
    <button class="ctrl-btn" id="btn-up">▲</button>
    <button class="ctrl-btn" id="btn-down">▼</button>
  </div>
  <div id="action-row">
    <button id="btn-log">📋<br>紀錄</button>
    <button id="btn-pax">🧍<br>乘客</button>
    <button id="btn-stop">開門</button>
  </div>
  <div class="ctrl-hint">按住 ▲▼ 移動 · 開門/關門上下客 · 紀錄/乘客暫停遊戲</div>
</div>

<script>
// ═══════════════════════════════
//  CONSTANTS
// ═══════════════════════════════
const NUM_FLOORS = 20;
const CAPACITY   = 10;
const FLOOR_H    = 88;
const SPEED      = FLOOR_H * 2.4;
const DOOR_TIME  = 900;

// Game time: 1 real second = 2 game minutes. Day = 24 game-hours = 12 real minutes.
// Loops endlessly. Active window 07:00–22:00 (=15 hrs = 450 game-min).
const REAL_MS_PER_GAME_MIN = 500; // 1 real second = 2 game minutes
const DAY_MINS = 1440; // 24 * 60

// ── FLOOR DEFINITIONS ──
// index 0 = floor 1 (ground), index 19 = floor 20
const FLOOR_DEFS = {
   0: { name:'大廳',   emoji:'🚪', color:'#ffe0f0', tc:'#c0407a' },
   2: { name:'便利商店',emoji:'🏪', color:'#fff3cd', tc:'#8b6914' },
   4: { name:'餐廳',   emoji:'🍜', color:'#ffe8d0', tc:'#c05800' },
   7: { name:'健身房', emoji:'💪', color:'#d8f5e8', tc:'#277a4e' },
   9: { name:'辦公室A',emoji:'💼', color:'#ddeeff', tc:'#2255aa' },
  14: { name:'辦公室B',emoji:'📋', color:'#e8e0ff', tc:'#5533bb' },
  19: { name:'展望台', emoji:'🌆', color:'#fff0d0', tc:'#aa6600' },
};

// ── SPAWN RULES per floor ──
// Each entry: { floorIdx, destFloorIdx or destFn, minHour, maxHour, weightFn(hour) }
// weightFn returns 0..1 relative spawn weight at given game hour
function lobbyWeight(h) {
  // high all day, peak 8-9 and 17-19
  if (h >= 8 && h <= 9)  return 1.0;
  if (h >= 17 && h <= 19) return 1.0;
  if (h >= 7 && h <= 22) return 0.45;
  return 0;
}
function convenienceWeight(h) { return (h >= 7 && h <= 22) ? 0.3 : 0; }
function restaurantWeight(h) {
  if (h >= 12 && h <= 13) return 1.0;
  if (h >= 18 && h <= 19) return 0.7;
  return 0.05;
}
function gymWeight(h) {
  if (h >= 7 && h <= 9)   return 0.9;
  if (h >= 18 && h <= 20) return 0.9;
  return 0.1;
}
function officeAWeight(h) {
  if (h >= 8 && h <= 10)  return 1.0;  // arrive
  if (h >= 17 && h <= 19) return 1.0;  // leave
  if (h >= 10 && h <= 17) return 0.15; // mid-day trickle
  return 0;
}
function officeBWeight(h) {
  if (h >= 9 && h <= 10)  return 0.7;
  if (h >= 18 && h <= 19) return 0.7;
  if (h >= 10 && h <= 18) return 0.1;
  return 0;
}
function observatoryWeight(h) {
  if (h >= 10 && h <= 20) return 0.25;
  return 0;
}

// Spawn pool entry: {srcFloor, destFloor(-1=random), weightFn}
const SPAWN_POOL = [
  // Lobby → various offices & amenities (morning rush)
  { src:0,  dest:-1,        w: lobbyWeight },
  // Convenience store: random floors, steady
  { src:2,  dest:-1,        w: convenienceWeight },
  // Restaurant: people come from all floors at lunch/dinner
  { src:-1, dest:4,         w: restaurantWeight },
  // Gym: morning & evening
  { src:0,  dest:7,         w: gymWeight },
  { src:7,  dest:0,         w: gymWeight },
  // Office A arrive (from lobby) / leave (to lobby)
  { src:0,  dest:9,         w: h => officeAWeight(h) > 0.5 && h < 14 ? officeAWeight(h) : 0 },
  { src:9,  dest:0,         w: h => officeAWeight(h) > 0.5 && h >= 14 ? officeAWeight(h) : 0 },
  { src:9,  dest:-1,        w: h => officeAWeight(h) * 0.3 }, // office internal movement
  // Office B arrive/leave
  { src:0,  dest:14,        w: h => officeBWeight(h) > 0.3 && h < 14 ? officeBWeight(h) : 0 },
  { src:14, dest:0,         w: h => officeBWeight(h) > 0.3 && h >= 14 ? officeBWeight(h) : 0 },
  // Observatory: tourists going up / coming down
  { src:0,  dest:19,        w: observatoryWeight },
  { src:19, dest:0,         w: observatoryWeight },
  // Generic random movement (background noise)
  { src:-1, dest:-1,        w: h => (h >= 7 && h <= 22) ? 0.15 : 0 },
];

// ═══════════════════════════════
//  STATE
// ═══════════════════════════════
let G = {};

function initState() {
  G = {
    floor:      0,
    pixelY:     0,
    dir:        0,
    pressing:   false,
    state:      'idle',
    doorTimer:  0,
    target:     -1,
    pax:        [],

    score:        0,
    floorsCount:  0,
    elapsed:      0,   // real ms
    lastTime:     null,
    passengers:   [],
    spawnTimer:   0,   // real ms timestamp of last spawn
    uid:          0,
    logs:         [],

    lastCountedFloor: 0,
    paused:   false,
    doorOpen: false,

    // Time system
    gameMins: 7 * 60,  // start at 07:00
  };
}

// ═══════════════════════════════
//  BUILD DOM
// ═══════════════════════════════
function buildFloors() {
  const strip = document.getElementById('floors-strip');
  strip.innerHTML = '';
  strip.style.height = (NUM_FLOORS * FLOOR_H) + 'px';

  for (let f = NUM_FLOORS - 1; f >= 0; f--) {
    const def = FLOOR_DEFS[f];
    const nameTag = def
      ? `<div class="floor-name" style="background:${def.color};color:${def.tc}">${def.emoji}${def.name}</div>`
      : '';
    const row = document.createElement('div');
    row.className = 'floor-row';
    row.id = `fr-${f}`;
    row.innerHTML = `
      <div class="floor-num">${f + 1}</div>
      <div class="floor-arrows" id="fa-${f}"></div>
      <div class="floor-pax" id="fp-${f}">${nameTag}</div>
      <div class="floor-shaft-gap"></div>`;
    row.addEventListener('click', () => clickFloor(f));
    strip.appendChild(row);
  }
}

// ═══════════════════════════════
//  SCROLL: keep current floor centred
// ═══════════════════════════════
function applyScroll() {
  const gameH = document.getElementById('game-area').clientHeight;
  // strip top for floor f: (NUM_FLOORS - 1 - f) * FLOOR_H
  // centre of current pixelY in strip coords:
  const stripPos = (NUM_FLOORS - 1) * FLOOR_H - G.pixelY + FLOOR_H / 2;
  const offset   = gameH / 2 - stripPos;
  document.getElementById('floors-strip').style.transform = `translateY(${offset}px)`;
}

// ═══════════════════════════════
//  CONTROLS
// ═══════════════════════════════
function pressUp(on) {
  if (G.state === 'door') return;
  document.getElementById('btn-up').classList.toggle('active', on);
  if (on) {
    G.dir = 1; G.pressing = true; G.target = -1; G.state = 'moving';
  } else {
    G.pressing = false;
    if (G.dir === 1 && G.state === 'moving') snapStop();
  }
}

function pressDown(on) {
  if (G.state === 'door') return;
  document.getElementById('btn-down').classList.toggle('active', on);
  if (on) {
    G.dir = -1; G.pressing = true; G.target = -1; G.state = 'moving';
  } else {
    G.pressing = false;
    if (G.dir === -1 && G.state === 'moving') snapStop();
  }
}

function snapStop() {
  G.floor    = Math.round(G.pixelY / FLOOR_H);
  G.pixelY   = G.floor * FLOOR_H;
  G.dir      = 0;
  G.pressing = false;
  G.state    = 'idle';
  // no auto door open — player must press the button
}

function clickFloor(f) {
  if (G.state === 'door') return;
  if (f === G.floor) return; // same floor, do nothing (player uses btn-stop to open)
  G.target   = f;
  G.pressing = false;
  G.dir      = f > G.floor ? 1 : -1;
  G.state    = 'moving';
}

// ═══════════════════════════════
//  DOOR TOGGLE
// ═══════════════════════════════

// ═══════════════════════════════
//  ELEVATOR PHYSICS
// ═══════════════════════════════
function updateElev(dt) {
  // Door state: player controls open/close, no auto-close
  if (G.state === 'door') return;
  if (G.state !== 'moving') return;

  const px = SPEED * (dt / 1000);
  G.pixelY += G.dir * px;

  const maxPx = (NUM_FLOORS - 1) * FLOOR_H;
  G.pixelY = Math.max(0, Math.min(maxPx, G.pixelY));

  // Count floor crossings
  const newFloor = Math.round(G.pixelY / FLOOR_H);
  if (newFloor !== G.lastCountedFloor) {
    const diff = Math.abs(newFloor - G.lastCountedFloor);
    G.floorsCount += diff;
    G.lastCountedFloor = newFloor;
  }
  G.floor = newFloor;

  // Wall stop while pressing
  if (G.pressing) {
    if ((G.dir === 1 && G.pixelY >= maxPx) || (G.dir === -1 && G.pixelY <= 0)) {
      snapStop();
    }
    return;
  }

  // Click-to-go arrived
  if (G.target >= 0) {
    const tPx = G.target * FLOOR_H;
    if ((G.dir === 1 && G.pixelY >= tPx) || (G.dir === -1 && G.pixelY <= tPx)) {
      G.pixelY = tPx;
      G.floor  = G.target;
      G.target = -1;
      G.dir    = 0;
      G.state  = 'idle';
      // no auto open — player presses button
    }
  }
}

function doToggleDoor() {
  if (G.paused) return;
  if (G.doorOpen) {
    // Close door — do NOT board anyone, just close
    closeDoors();
  } else {
    // Snap stop if moving, then open
    if (G.state === 'moving') {
      G.floor   = Math.round(G.pixelY / FLOOR_H);
      G.pixelY  = G.floor * FLOOR_H;
      G.dir     = 0;
      G.pressing = false;
      G.target  = -1;
    }
    openDoors();
  }
}

function openDoors() {
  G.doorOpen  = true;
  G.state     = 'door';
  G.doorTimer = 0;   // no auto-close timer; player closes manually
  document.getElementById('elev-car').classList.add('door-open');
  document.getElementById('btn-stop').classList.add('door-is-open');
  document.getElementById('btn-stop').textContent = '關門';
  // Drop off passengers whose destination is current floor
  G.pax = G.pax.filter(p => {
    if (p.dest !== G.floor) return true;
    G.score++;
    addLog(`到達 ${G.floor + 1}F  +1分`, 'good');
    floatScore('+1', '#38bdf8');
    return false;
  });
  // Board waiting passengers
  G.passengers.forEach(p => {
    if (!p.waiting || p.start !== G.floor) return;
    if (G.pax.length >= CAPACITY) return;
    p.waiting = false;
    G.pax.push(p);
    addLog(`上梯 ${p.start + 1}F → ${p.dest + 1}F`, 'info');
  });
}

function closeDoors() {
  G.doorOpen = false;
  document.getElementById('elev-car').classList.remove('door-open');
  document.getElementById('btn-stop').classList.remove('door-is-open');
  document.getElementById('btn-stop').textContent = '開門';
  G.state    = 'idle';
  G.dir      = 0;
  G.pressing = false;
  // No boarding on close — intentional
}

// ═══════════════════════════════
//  TIME SYSTEM
// ═══════════════════════════════
function updateGameTime(dt) {
  // Advance game time; loop endlessly
  const minsElapsed = dt / REAL_MS_PER_GAME_MIN;
  G.gameMins = (G.gameMins + minsElapsed) % DAY_MINS;
}

function gameHour() { return G.gameMins / 60; }

function timePeriod(h) {
  if (h >= 5  && h < 7)  return { label:'🌅 破曉', bg:'#fff3e0', fill:'#ffab40', fillc:'#e65100' };
  if (h >= 7  && h < 9)  return { label:'🌞 早晨', bg:'#fff8e1', fill:'#ffd54f', fillc:'#f57f17' };
  if (h >= 9  && h < 12) return { label:'☀️ 上午', bg:'#f3f8ff', fill:'#64b5f6', fillc:'#1565c0' };
  if (h >= 12 && h < 14) return { label:'🍱 午餐', bg:'#fff8e1', fill:'#ffb300', fillc:'#e65100' };
  if (h >= 14 && h < 17) return { label:'🌤 下午', bg:'#f3f8ff', fill:'#81c784', fillc:'#2e7d32' };
  if (h >= 17 && h < 19) return { label:'🌆 傍晚', bg:'#fff3e0', fill:'#ff8a65', fillc:'#bf360c' };
  if (h >= 19 && h < 22) return { label:'🌙 夜晚', bg:'#f3e5f5', fill:'#9575cd', fillc:'#4527a0' };
  return { label:'🌛 深夜', bg:'#e8eaf6', fill:'#7986cb', fillc:'#1a237e' };
}

function renderTimebar() {
  const h = gameHour();
  const hh = Math.floor(G.gameMins / 60) % 24;
  const mm = Math.floor(G.gameMins % 60);
  const p  = timePeriod(h);
  const dayPct = (G.gameMins / DAY_MINS) * 100;

  document.getElementById('time-bar-clock').textContent =
    `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
  document.getElementById('time-bar-period').textContent = p.label;
  document.getElementById('time-bar').style.background = p.bg;
  const fill = document.getElementById('time-progress-fill');
  fill.style.width = dayPct + '%';
  fill.style.background = `linear-gradient(90deg, ${p.fillc}, ${p.fill})`;
}

// ═══════════════════════════════
//  SPAWN (personality-driven)
// ═══════════════════════════════
function pickDest(src) {
  // weighted random dest: prefer named floors
  const candidates = [];
  for (let f = 0; f < NUM_FLOORS; f++) {
    if (f === src) continue;
    const w = FLOOR_DEFS[f] ? 3 : 1;
    candidates.push({ f, w });
  }
  const total = candidates.reduce((s, c) => s + c.w, 0);
  let r = Math.random() * total;
  for (const c of candidates) { r -= c.w; if (r <= 0) return c.f; }
  return candidates[candidates.length - 1].f;
}

function spawnPax(now) {
  const h = gameHour();

  // Compute total weight across all pool entries
  const weights = SPAWN_POOL.map(e => Math.max(0, e.w(h)));
  const total   = weights.reduce((s, w) => s + w, 0);
  if (total <= 0) return; // nobody out at this hour

  // Base interval: lighter at night, busier at peak
  const baseInterval = 2200;
  const peakMult = Math.max(0.4, 1 - total * 0.5);
  const interval = baseInterval * peakMult;

  if (now - G.spawnTimer < interval) return;
  G.spawnTimer = now;

  // Pick a pool entry weighted by w(h)
  let r = Math.random() * total;
  let entry = SPAWN_POOL[SPAWN_POOL.length - 1];
  for (let i = 0; i < SPAWN_POOL.length; i++) {
    r -= weights[i];
    if (r <= 0) { entry = SPAWN_POOL[i]; break; }
  }

  // Resolve src / dest
  let src  = entry.src  >= 0 ? entry.src  : Math.floor(Math.random() * NUM_FLOORS);
  let dest = entry.dest >= 0 ? entry.dest : pickDest(src);
  if (src === dest) dest = pickDest(src);
  if (src === dest) return;

  G.passengers.push({
    id: G.uid++, start: src, dest,
    dir: dest > src ? 1 : -1,
    type: 'normal',
    waiting: true,
  });
}

// ═══════════════════════════════
//  RENDER
// ═══════════════════════════════
function renderAll() {
  applyScroll();

  // Current floor highlight
  document.querySelectorAll('.floor-row').forEach(r => r.classList.remove('is-current'));
  const cur = document.getElementById(`fr-${G.floor}`);
  if (cur) cur.classList.add('is-current');

  // Elevator car
  const isDoor = G.state === 'door';
  const dirEl  = document.getElementById('elev-dir');
  dirEl.textContent = G.dir === 1 ? '▲' : G.dir === -1 ? '▼' : (isDoor ? '⊡' : '─');
  dirEl.style.color = G.dir === 1 ? 'var(--green)' :
                      G.dir === -1 ? 'var(--red)' :
                      isDoor ? 'var(--green)' : 'var(--accent)';
  document.getElementById('elev-cnt').textContent = `${G.pax.length}/${CAPACITY}`;

  // Floor indicator bar
  const curDef = FLOOR_DEFS[G.floor];
  document.getElementById('fi-floor').textContent =
    `${G.floor + 1}F${curDef ? ' ' + curDef.emoji : ''}`;
  document.getElementById('fi-pax').textContent   = `${G.pax.length} / ${CAPACITY} 人`;
  const stMap = { idle:'待機中', moving: G.dir === 1 ? '⬆ 上行' : '⬇ 下行', door:'🚪 開門中' };
  document.getElementById('fi-state').textContent = stMap[G.state] || '待機中';
  const fiDir = document.getElementById('fi-dir');
  fiDir.textContent = G.dir === 1 ? '▲' : G.dir === -1 ? '▼' : '─';
  fiDir.style.color = G.dir === 1 ? 'var(--green)' : G.dir === -1 ? 'var(--red)' : 'var(--text3)';

  // Passengers on floors — preserve floor-name tag, then append pax figures
  for (let f = 0; f < NUM_FLOORS; f++) {
    const pArea = document.getElementById(`fp-${f}`);
    const aArea = document.getElementById(`fa-${f}`);
    if (!pArea) continue;
    const here = G.passengers.filter(p => p.waiting && p.start === f);

    // Rebuild: name tag first, then up to 6 pax figures
    const def = FLOOR_DEFS[f];
    const nameTag = def
      ? `<div class="floor-name" style="background:${def.color};color:${def.tc}">${def.emoji}${def.name}</div>`
      : '';
    const paxHtml = here.slice(0, 6).map(() => `
      <div class="pax-fig">
        <div class="pax-head"></div>
        <div class="pax-body"></div>
      </div>`).join('');
    // Show count if more than 6
    const extra = here.length > 6 ? `<span style="font-size:9px;font-weight:800;color:var(--text3)">+${here.length-6}</span>` : '';
    pArea.innerHTML = nameTag + paxHtml + extra;

    if (aArea) {
      const up = here.some(p => p.dir === 1);
      const dn = here.some(p => p.dir === -1);
      aArea.innerHTML =
        (up ? '<div class="arr-up">▲</div>'   : '') +
        (dn ? '<div class="arr-down">▼</div>' : '');
    }
  }

  // HUD
  document.getElementById('s-score').textContent  = G.score;
  document.getElementById('s-floors').textContent = G.floorsCount;
  const s = Math.floor(G.elapsed / 1000);
  document.getElementById('s-time').textContent =
    `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;

  // Time bar
  renderTimebar();
}

// ═══════════════════════════════
//  LOG + FLOAT
// ═══════════════════════════════
function addLog(msg, type = '') {
  G.logs.unshift({ msg, type });
  if (G.logs.length > 50) G.logs.pop();
  const list = document.getElementById('log-list');
  list.innerHTML = G.logs.map(l =>
    `<div class="log-pill log-${l.type}">${l.msg}</div>`
  ).join('');
}

function floatScore(text, color) {
  const car = document.getElementById('elev-car');
  const r   = car.getBoundingClientRect();
  const el  = document.createElement('div');
  el.className = 'float-score';
  el.style.cssText = `left:${r.left + r.width / 2 - 14}px;top:${r.top - 8}px;color:${color}`;
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1050);
}

// ═══════════════════════════════
//  LOOP
// ═══════════════════════════════
function loop(now) {
  if (G.paused) {
    G.lastTime = now;
    requestAnimationFrame(loop);
    return;
  }
  if (!G.lastTime) G.lastTime = now;
  const dt = Math.min(now - G.lastTime, 80);
  G.lastTime = now;
  G.elapsed += dt;

  updateGameTime(dt);
  spawnPax(now);
  updateElev(dt);
  renderAll();

  requestAnimationFrame(loop);
}

// ═══════════════════════════════
//  EVENTS
// ═══════════════════════════════

// ▲ button — hold to move up
const bUp = document.getElementById('btn-up');
bUp.addEventListener('mousedown',   () => pressUp(true));
bUp.addEventListener('mouseup',     () => pressUp(false));
bUp.addEventListener('mouseleave',  () => pressUp(false));
bUp.addEventListener('touchstart',  e => { e.preventDefault(); pressUp(true);  }, { passive: false });
bUp.addEventListener('touchend',    e => { e.preventDefault(); pressUp(false); }, { passive: false });
bUp.addEventListener('touchcancel', () => pressUp(false));

// ▼ button — hold to move down
const bDn = document.getElementById('btn-down');
bDn.addEventListener('mousedown',   () => pressDown(true));
bDn.addEventListener('mouseup',     () => pressDown(false));
bDn.addEventListener('mouseleave',  () => pressDown(false));
bDn.addEventListener('touchstart',  e => { e.preventDefault(); pressDown(true);  }, { passive: false });
bDn.addEventListener('touchend',    e => { e.preventDefault(); pressDown(false); }, { passive: false });
bDn.addEventListener('touchcancel', () => pressDown(false));

// ── PAUSE helpers ──
function setPaused(on) {
  G.paused = on;
  const tint = document.getElementById('pause-tint');
  tint.classList.toggle('on', on);
}

// ── Open/Close door button ──
document.getElementById('btn-stop').addEventListener('click', () => doToggleDoor());
document.getElementById('btn-stop').addEventListener('touchend', e => {
  e.preventDefault(); doToggleDoor();
}, { passive: false });

// ── Log button toggle ──
const btnLog    = document.getElementById('btn-log');
const logOverlay = document.getElementById('log-overlay');
const paxOverlay = document.getElementById('pax-overlay');

function closeAllOverlays() {
  logOverlay.classList.remove('open');
  paxOverlay.classList.remove('open');
  btnLog.classList.remove('active');
  document.getElementById('btn-pax').classList.remove('active');
  setPaused(false);
}

function toggleLog() {
  const willOpen = !logOverlay.classList.contains('open');
  closeAllOverlays();
  if (willOpen) {
    logOverlay.classList.add('open');
    btnLog.classList.add('active');
    setPaused(true);
  }
}
btnLog.addEventListener('click', toggleLog);
document.getElementById('log-overlay-close').addEventListener('click', closeAllOverlays);

// ── Pax button toggle ──
const btnPax = document.getElementById('btn-pax');
function renderPaxOverlay() {
  const list = document.getElementById('pax-list');
  if (G.pax.length === 0) {
    list.innerHTML = '<div id="pax-overlay-empty">電梯內目前無乘客 🥲</div>';
    return;
  }
  list.innerHTML = G.pax.map(p => {
    const def = FLOOR_DEFS[p.dest];
    const label = def ? `${def.emoji} ${def.name} (${p.dest+1}F)` : `${p.dest+1}F`;
    return `<div class="pax-list-row">
      <span class="pax-list-icon">🧍</span>
      <span class="pax-list-dest">${p.dest+1}F</span>
      <span class="pax-list-label">${def ? def.emoji+' '+def.name : '目的地'}</span>
    </div>`;
  }).join('');
}
function togglePax() {
  const willOpen = !paxOverlay.classList.contains('open');
  closeAllOverlays();
  if (willOpen) {
    renderPaxOverlay();
    paxOverlay.classList.add('open');
    btnPax.classList.add('active');
    setPaused(true);
  }
}
btnPax.addEventListener('click', togglePax);
document.getElementById('pax-overlay-close').addEventListener('click', closeAllOverlays);

// ── Keyboard ──
const keysHeld = new Set();
document.addEventListener('keydown', ev => {
  if (keysHeld.has(ev.key)) return;
  keysHeld.add(ev.key);
  if (ev.key === 'ArrowUp')   { ev.preventDefault(); pressUp(true); }
  if (ev.key === 'ArrowDown') { ev.preventDefault(); pressDown(true); }
  if (ev.key === ' ')         { ev.preventDefault(); doToggleDoor(); }
  if (ev.key === 'Escape')    closeAllOverlays();
});
document.addEventListener('keyup', ev => {
  keysHeld.delete(ev.key);
  if (ev.key === 'ArrowUp')   pressUp(false);
  if (ev.key === 'ArrowDown') pressDown(false);
});

// ═══════════════════════════════
//  START
// ═══════════════════════════════
initState();
buildFloors();
applyScroll();
addLog('按住 ▲▼ 移動電梯', 'info');
addLog('按「開門」手動上下乘客', 'info');
requestAnimationFrame(loop);
</script>
